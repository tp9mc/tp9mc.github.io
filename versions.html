<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Версии сайта</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --fg:#1d1d1f;--fg-muted:#6e6e73;--fg-faint:#aeaeb2;
  --border:#e8e8ed;--bg:#fff;--bg-h:#f5f5f7;
  --green:#30d158;--red:#ff3b30;--blue:#0071e3;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif
}
html,body{min-height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased}

/* Header */
.hdr{display:flex;align-items:center;gap:14px;padding:20px 32px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);z-index:10}
.hdr-back{font-size:12px;color:var(--blue);text-decoration:none}
.hdr-back:hover{text-decoration:underline}
.hdr-sep{width:1px;height:13px;background:var(--border)}
.hdr-t{font-size:15px;font-weight:600;letter-spacing:-.015em}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.show-hidden-btn{font-size:11px;color:var(--fg-faint);background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px 0}
.show-hidden-btn:hover{color:var(--fg-muted)}

/* Wrap */
.wrap{max-width:580px;margin:0 auto;padding:24px 24px 80px}

/* Token card */
.token-card{background:var(--bg-h);border-radius:14px;padding:16px 18px;margin-bottom:22px}
.token-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.token-link{font-size:10px;color:var(--blue);text-decoration:none;font-weight:500;text-transform:none;letter-spacing:0}
.token-link:hover{text-decoration:underline}
.token-row{display:flex;gap:8px}
.token-input{flex:1;font-size:13px;font-family:var(--font);border:1px solid var(--border);border-radius:9px;padding:8px 12px;outline:none;background:#fff;color:var(--fg)}
.token-input:focus{border-color:#aeaeb2}
.token-save{font-size:12px;font-weight:600;font-family:var(--font);background:var(--fg);color:#fff;border:none;border-radius:9px;padding:8px 14px;cursor:pointer}
.token-save:hover{background:#3a3a3c}
.token-ok{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg-muted)}
.token-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.token-clear{font-size:11px;font-family:var(--font);background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--fg-faint);margin-left:auto}
.token-clear:hover{border-color:#aeaeb2;color:var(--fg-muted)}

/* Section */
.sec-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:10px}

/* List */
.vlist{border:1px solid var(--border);border-radius:14px;overflow:hidden}

.vitem{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;border-bottom:1px solid #f2f2f7;transition:background .1s}
.vitem:last-child{border-bottom:none}
.vitem:hover{background:var(--bg-h)}
.vitem.current{background:#f0fdf4}
.vitem.hidden-item{opacity:.45}

.vitem-num{font-size:10px;color:var(--fg-faint);flex-shrink:0;padding-top:3px;width:16px;text-align:right}

.vitem-body{flex:1;min-width:0}
.vitem-name{font-size:13px;color:var(--fg);line-height:1.4;margin-bottom:3px;word-break:break-word}
.vitem-name.edited{color:var(--fg);font-style:normal}
.vitem-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.vitem-date{font-size:11px;color:var(--fg-faint)}
.vitem-sha{font-family:ui-monospace,"SF Mono",monospace;font-size:10px;color:#aeaeb2}
.badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:.03em}
.badge-cur{background:var(--green);color:#fff}
.badge-hidden{background:#e5e5ea;color:#8e8e93}
.badge-renamed{background:#f5f0ff;color:#8944ab}

/* Inline rename input */
.rename-input{font-size:13px;font-family:var(--font);border:1px solid #aeaeb2;border-radius:7px;padding:4px 8px;outline:none;background:#fff;color:var(--fg);width:100%;margin-bottom:6px}
.rename-input:focus{border-color:var(--fg)}
.rename-actions{display:flex;gap:6px}
.rename-ok{font-size:11px;font-weight:600;font-family:var(--font);background:var(--fg);color:#fff;border:none;border-radius:7px;padding:5px 12px;cursor:pointer}
.rename-ok:hover{background:#3a3a3c}
.rename-cancel{font-size:11px;font-family:var(--font);background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;cursor:pointer;color:var(--fg-muted)}

/* Action buttons */
.vitem-actions{flex-shrink:0;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.abtn{font-size:11px;font-weight:500;font-family:var(--font);padding:5px 11px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--fg-muted);transition:all .12s;white-space:nowrap}
.abtn:hover{border-color:var(--fg-muted);color:var(--fg)}
.abtn.restore{font-weight:600;background:var(--fg);color:#fff;border-color:var(--fg)}
.abtn.restore:hover{background:#3a3a3c}
.abtn.del{border-color:#ffd0cc;color:#ff6b60}
.abtn.del:hover{background:var(--red);border-color:var(--red);color:#fff}
.abtn.undel{border-color:#d0f0d8;color:var(--green)}
.abtn.undel:hover{background:var(--green);border-color:var(--green);color:#fff}
.abtn:disabled{opacity:.3;cursor:not-allowed}

/* Status */
.status{padding:24px;font-size:12px;color:var(--fg-faint);text-align:center}
.err{color:var(--red);background:#fff5f5;border-radius:10px;padding:14px;font-size:12px}

/* Confirm modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:18px;padding:26px;width:300px;box-shadow:0 24px 64px rgba(0,0,0,.16)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:8px}
.modal-msg{font-size:12px;color:var(--fg-muted);line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:8px}
.modal-cancel{flex:1;font-size:13px;font-weight:500;font-family:var(--font);padding:10px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--fg-muted)}
.modal-cancel:hover{background:var(--bg-h)}
.modal-ok{flex:1;font-size:13px;font-weight:600;font-family:var(--font);padding:10px;border-radius:10px;border:none;background:var(--red);color:#fff;cursor:pointer}
.modal-ok:hover{background:#d70015}
.modal-ok.green{background:var(--green)}
.modal-ok.green:hover{background:#25a244}
.modal-ok:disabled{opacity:.5;cursor:not-allowed}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(29,29,31,.8);backdrop-filter:blur(12px);color:#fff;font-size:12px;font-weight:500;padding:8px 18px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<header class="hdr">
  <a class="hdr-back" href="/">← На сайт</a>
  <span class="hdr-sep"></span>
  <span class="hdr-t">Версии сайта</span>
  <div class="hdr-right">
    <button class="show-hidden-btn" id="toggle-hidden" onclick="toggleHidden()">Показать скрытые</button>
  </div>
</header>

<div class="wrap">
  <div class="token-card">
    <div class="token-label">
      GitHub токен
      <a class="token-link" href="https://github.com/settings/tokens/new?description=tp9mc-site-versions&scopes=repo" target="_blank">создать →</a>
    </div>
    <div id="token-set">
      <div class="token-row">
        <input class="token-input" id="tok-input" type="password" placeholder="ghp_..." autocomplete="off"/>
        <button class="token-save" onclick="saveToken()">Сохранить</button>
      </div>
    </div>
    <div id="token-ok" style="display:none">
      <div class="token-row" style="align-items:center">
        <div class="token-ok"><span class="token-dot"></span>Токен сохранён</div>
        <button class="token-clear" onclick="clearToken()">Сбросить</button>
      </div>
    </div>
  </div>

  <div class="sec-title">История · index.html</div>
  <div id="vlist"><div class="status">Введи токен чтобы загрузить историю</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
var REPO = 'tp9mc/tp9mc.github.io';
var FILE = 'index.html';
var META_FILE = 'versions-meta.json';

var state = {
  commits: [],
  meta: {},        // {sha: {name, hidden}}
  metaSha: null,
  showHidden: false,
  savingMeta: false
};

// ── Token ──
function tok(){ return localStorage.getItem('gh_v_token') || ''; }
function saveToken(){
  var v = document.getElementById('tok-input').value.trim();
  if(!v) return;
  localStorage.setItem('gh_v_token', v);
  document.getElementById('tok-input').value = '';
  showTokOk(); load();
}
function clearToken(){
  localStorage.removeItem('gh_v_token');
  document.getElementById('token-set').style.display = '';
  document.getElementById('token-ok').style.display = 'none';
  document.getElementById('vlist').innerHTML = '<div class="status">Введи токен чтобы загрузить историю</div>';
}
function showTokOk(){
  document.getElementById('token-set').style.display = 'none';
  document.getElementById('token-ok').style.display = '';
}

// ── GitHub API ──
function gh(path, opts){
  var headers = {'Authorization':'token '+tok(),'Accept':'application/vnd.github.v3+json'};
  if(opts && opts.headers) Object.assign(headers, opts.headers);
  return fetch('https://api.github.com'+path, Object.assign({}, opts||{}, {headers:headers}));
}

// ── Load ──
function load(){
  document.getElementById('vlist').innerHTML = '<div class="status">Загружаю…</div>';
  Promise.all([
    gh('/repos/'+REPO+'/commits?path='+FILE+'&per_page=50').then(function(r){return r.json();}),
    gh('/repos/'+REPO+'/contents/'+META_FILE).then(function(r){return r.json();})
  ]).then(function(results){
    var commits = results[0], metaRes = results[1];
    if(!Array.isArray(commits)){
      document.getElementById('vlist').innerHTML = '<div class="err">'+esc(commits.message||'Ошибка — проверь токен')+'</div>';
      return;
    }
    state.commits = commits;
    state.metaSha = metaRes.sha || null;
    try { state.meta = JSON.parse(atob(metaRes.content.replace(/\n/g,''))); } catch(e){ state.meta = {}; }
    render();
  }).catch(function(e){
    document.getElementById('vlist').innerHTML = '<div class="err">'+esc(e.message)+'</div>';
  });
}

// ── Render ──
function render(){
  var commits = state.commits;
  if(!commits.length){ document.getElementById('vlist').innerHTML='<div class="status">История пуста</div>'; return; }

  var visibleIdx = 0;
  var html = '<div class="vlist">';
  for(var i=0;i<commits.length;i++){
    var c = commits[i];
    var sha = c.sha;
    var m = state.meta[sha] || {};
    var hidden = !!m.hidden;
    if(hidden && !state.showHidden) continue;
    var isCur = (i === 0);
    var displayName = m.name || c.commit.message.split('\n')[0];
    var date = fmtDate(c.commit.committer.date);
    visibleIdx++;

    html += '<div class="vitem'+(isCur?' current':'')+(hidden?' hidden-item':'')+'" id="vi-'+sha+'">';
    html += '<div class="vitem-num">'+(isCur?'●':visibleIdx)+'</div>';

    // Body
    html += '<div class="vitem-body">';
    // Rename input (hidden by default)
    html += '<div id="re-'+sha+'" style="display:none">'
      +'<input class="rename-input" id="ri-'+sha+'" value="'+esc(displayName)+'" />'
      +'<div class="rename-actions">'
      +'<button class="rename-ok" onclick="doRename(\''+sha+'\')">Сохранить</button>'
      +'<button class="rename-cancel" onclick="hideRename(\''+sha+'\')">Отмена</button>'
      +'</div></div>';
    // Name display
    html += '<div class="vitem-name'+(m.name?' edited':'')+'" id="nm-'+sha+'" onclick="startRename(\''+sha+'\')" title="Нажми чтобы переименовать">'+esc(displayName)+'</div>';
    // Meta line
    html += '<div class="vitem-meta">';
    html += '<span class="vitem-date">'+date+'</span>';
    html += '<span class="vitem-sha">'+sha.substring(0,7)+'</span>';
    if(isCur)  html += '<span class="badge badge-cur">текущая</span>';
    if(hidden) html += '<span class="badge badge-hidden">скрыта</span>';
    if(m.name) html += '<span class="badge badge-renamed">переименована</span>';
    html += '</div></div>'; // end vitem-body

    // Actions
    html += '<div class="vitem-actions">';
    if(isCur){
      html += '<button class="abtn" disabled>Текущая</button>';
    } else {
      html += '<button class="abtn restore" onclick="confirmRestore(\''+sha+'\',\''+esc2(displayName)+'\')">Откатить</button>';
    }
    if(hidden){
      html += '<button class="abtn undel" onclick="undeleteVersion(\''+sha+'\')">Вернуть</button>';
    } else {
      html += '<button class="abtn del" onclick="confirmDelete(\''+sha+'\',\''+esc2(displayName)+'\')">Скрыть</button>';
    }
    html += '</div>';

    html += '</div>'; // end vitem
  }
  html += '</div>';
  document.getElementById('vlist').innerHTML = html;

  var btn = document.getElementById('toggle-hidden');
  var hiddenCount = Object.values(state.meta).filter(function(m){return m.hidden;}).length;
  btn.textContent = state.showHidden
    ? 'Скрыть скрытые'
    : ('Показать скрытые'+(hiddenCount?' ('+hiddenCount+')':''));
}

// ── Toggle hidden ──
function toggleHidden(){
  state.showHidden = !state.showHidden;
  render();
}

// ── Rename ──
function startRename(sha){
  document.getElementById('re-'+sha).style.display = '';
  document.getElementById('nm-'+sha).style.display = 'none';
  var inp = document.getElementById('ri-'+sha);
  inp.focus(); inp.select();
}
function hideRename(sha){
  document.getElementById('re-'+sha).style.display = 'none';
  document.getElementById('nm-'+sha).style.display = '';
}
function doRename(sha){
  var val = document.getElementById('ri-'+sha).value.trim();
  if(!val) return;
  var orig = (state.commits.find(function(c){return c.sha===sha;})||{commit:{message:''}}).commit.message.split('\n')[0];
  if(!state.meta[sha]) state.meta[sha] = {};
  // If name matches original, remove custom name
  if(val === orig) delete state.meta[sha].name;
  else state.meta[sha].name = val;
  saveMeta(function(){ toast('Переименовано'); render(); });
}

// ── Delete / Restore ──
function confirmDelete(sha, name){
  modal(
    'Скрыть версию?',
    'Версия <b>'+esc(name)+'</b> исчезнет из списка. Её можно вернуть через «Показать скрытые».',
    'Скрыть',
    function(){ doDelete(sha); }
  );
}
function doDelete(sha){
  if(!state.meta[sha]) state.meta[sha] = {};
  state.meta[sha].hidden = true;
  saveMeta(function(){ toast('Версия скрыта'); render(); });
}
function undeleteVersion(sha){
  if(state.meta[sha]) delete state.meta[sha].hidden;
  saveMeta(function(){ toast('Версия восстановлена'); render(); });
}

// ── Save meta ──
function saveMeta(cb){
  if(state.savingMeta) return;
  state.savingMeta = true;
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(state.meta, null, 2))));
  var body = {message:'meta: обновлены названия/видимость версий', content:content};
  if(state.metaSha) body.sha = state.metaSha;
  gh('/repos/'+REPO+'/contents/'+META_FILE, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(res){
    state.savingMeta = false;
    if(res.content) state.metaSha = res.content.sha;
    if(cb) cb();
  }).catch(function(e){
    state.savingMeta = false;
    toast('Ошибка сохранения: '+e.message);
  });
}

// ── Restore ──
function confirmRestore(sha, name){
  modal(
    'Откатить версию?',
    'Сайт вернётся к состоянию:<br><br><b>'+esc(name)+'</b><br><br>Текущая версия останется в истории.',
    'Откатить',
    function(){ doRestore(sha, name); }
  );
}
function doRestore(sha, name){
  closeModal();
  showModal('<div class="modal"><div class="modal-title">Откатываю…</div><div class="modal-msg">Загружаю файл из истории</div></div>');
  gh('/repos/'+REPO+'/contents/'+FILE+'?ref='+sha)
    .then(function(r){return r.json();})
    .then(function(target){
      return gh('/repos/'+REPO+'/contents/'+FILE)
        .then(function(r){return r.json();})
        .then(function(cur){
          return gh('/repos/'+REPO+'/contents/'+FILE,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              message:'Откат к: '+name,
              content:target.content.replace(/\n/g,''),
              sha:cur.sha
            })
          });
        });
    })
    .then(function(r){return r.json();})
    .then(function(res){
      closeModal();
      if(res.commit){
        modal('Готово ✓','Откат выполнен. GitHub Pages пересобирает сайт — ~30 секунд.','Обновить страницу',function(){location.reload();},true);
        setTimeout(function(){load();},4000);
      } else {
        modal('Ошибка',res.message||JSON.stringify(res),'OK',function(){});
      }
    }).catch(function(e){closeModal();modal('Ошибка',e.message,'OK',function(){});});
}

// ── Modal ──
function modal(title, msg, okLabel, onOk, green){
  closeModal();
  var el = document.createElement('div');
  el.className='modal-bg'; el.id='modal-bg';
  el.innerHTML='<div class="modal">'
    +'<div class="modal-title">'+title+'</div>'
    +'<div class="modal-msg">'+msg+'</div>'
    +'<div class="modal-btns">'
    +'<button class="modal-cancel" onclick="closeModal()">Отмена</button>'
    +'<button class="modal-ok'+(green?' green':'')+'" id="modal-ok">'+okLabel+'</button>'
    +'</div></div>';
  document.body.appendChild(el);
  document.getElementById('modal-ok').onclick = function(){
    this.disabled=true; this.textContent='…'; onOk();
  };
}
function showModal(html){ closeModal(); var el=document.createElement('div'); el.className='modal-bg'; el.id='modal-bg'; el.innerHTML=html; document.body.appendChild(el); }
function closeModal(){ var el=document.getElementById('modal-bg'); if(el) el.remove(); }

// ── Toast ──
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove('show');},2200);
}

// ── Helpers ──
function fmtDate(iso){
  var d=new Date(iso);
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'})
    +', '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc2(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;').substring(0,60); }

// ── Init ──
if(tok()){ showTokOk(); load(); }
</script>
</body>
</html>
