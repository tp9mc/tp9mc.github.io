name: po-bots

# Разовый опрос Telegram (ручной запасной вариант).
# Постоянные ответы в реальном времени несёт realtime-bots.yml — держать
# два опроса одновременно нельзя: Telegram отдаёт getUpdates только одному
# потребителю (второй получит 409 Conflict).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: realtime-bots   # не пересекаемся с вахтой
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      PARSING_BOT_TOKEN: ${{ secrets.PARSING_BOT_TOKEN }}
      MATCHING_BOT_TOKEN: ${{ secrets.MATCHING_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r tools/requirements.txt

      - name: Poll & reply
        run: python -m tools.po_bots.poll_and_reply

      - name: Commit bot state
        run: |
          git config user.name "lt-po-bots"
          git config user.email "po-bots@users.noreply.github.com"
          git add data/bots
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "po-bots: состояние диалога"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep $((i * 3))
          done
