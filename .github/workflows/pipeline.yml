name: pipeline

# Полный прогон: симуляция рынка → LT Parsing → LT Matching → аналитика →
# коммит данных в main → пересборка GitHub Pages → отчёты PO-ботов.
on:
  schedule:
    - cron: "17 */3 * * *"   # каждые 3 часа
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PARSING_BOT_TOKEN: ${{ secrets.PARSING_BOT_TOKEN }}
      MATCHING_BOT_TOKEN: ${{ secrets.MATCHING_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r tools/requirements.txt

      - name: Run pipeline
        run: python -m tools.run_pipeline

      - name: Commit data & shops
        run: |
          git config user.name "lt-pipeline"
          git config user.email "pipeline@users.noreply.github.com"
          git add data shops
          if git diff --cached --quiet; then
            echo "нет изменений"; exit 0
          fi
          git commit -m "pipeline: прогон $(date -u +%Y-%m-%d\ %H:%M) UTC"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep $((i * 3))
          done

      - name: Request Pages build
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" || true

      - name: PO bots report
        if: env.PARSING_BOT_TOKEN != '' || env.MATCHING_BOT_TOKEN != ''
        run: python -m tools.po_bots.send_report --kind auto
