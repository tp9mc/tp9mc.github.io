var DATA=[[{id:1933,rating:3121,date:"14.11.2007",text:"Mopozzz: сижу на лекции в поточной аудитории и вдруг слышу кто-то кричит пинг  172.31.2.132 (мой айпишник)....   \nMopozzz: ну я поворачиваюсь, думаю чё за глюк и кто это сказал?...и... падаю под стол:  \nMopozzz: На меня летит ПАКЕТ!..."},{id:3230,rating:2868,date:"27.02.2008",text:"Введите любое 11-значное простое число, чтобы продолжить..."},{id:8695,rating:2850,date:"05.01.2009",text:"Она: /me не суппорт \nОна: /me точно не суппорт.. \nОна: /me блондинка... \nОна: розовые кофточки правят миром \nОна: /me рождена, чтобы красить ногти \nОн: гг не всё так просто.. \nОна: это почему? \nОна: всё именно так.. \nОн: Угу.. Но почему то ты консультируешь всех по линю и собираешься ставить генту.. \nОна: ну... \nОна: зато у меня live генты на розовом диске..."},{id:3539,rating:2797,date:"26.03.2008",text:"Astarra: Трушный виндовсник при знакомстве с линухом не прописывает в баше man rm, а пишет сразу rm -rf/, в рассчете на то, что \"обычно\" выскакивающее окошко с подтверждением выполняемой команды а-ля \"Вы действительно хотите...\" разъяснит ему суть того, что он \"изучает\" :D"},{id:6172,rating:2699,date:"25.10.2008",text:"xxx: меня всегда удивляли задроты сидящие на линуксах, бздях и тд и тп \nyyy: а ты хоть раз видел настоящего юниксоида, что бы говорить, задрот он, или нет? \nxxx: да блин. если человек офигеть круглые сутки безполезную хрень, то он по определению здрот \nyyy: х-се бесполезную. ты хоть раз видел то живьем freebsd? \nxxx: да впизду ваши линуксы и бзди. вот будет линейка под лиукс, может и попробую. а так наплевать он мне нужен \nyyy: lineage? и давно ты в нее играешь? \nxxx: да полгода наверно, перса до 34 левела уже качнул. \nyyy: ну так слушай, мы оба студенты вечернего отделения. судя по всему, большинство дня ты тратишь на линейку, и кормят тебя мама с папой. я работаю по полной уже 8 месяцев, на работу устроился благодаря умению работать с фрей, получаю 40000, и будут еще увеличивать. и кто из нас задрот - ты подумай. хорошо подумай. если уверен, что я - качайся дальше."},{id:2819,rating:2638,date:"16.01.2008",text:"xxx: да, винда — адская система. :)  \nyyy: это линукс адская с его демонами и зомби. Винда - система православная, там иконы и службы проводятся. \n\n(с) forum.b.gz.ru"},{id:1553,rating:2588,date:"05.10.2007",text:"<SerGo> Нужен питон-программист...срочно\n<#!usr/bin/nah> эм...к сожалению остались только хомяки-дизайнеры"},{id:1650,rating:2483,date:"17.10.2007",text:"обнаружил в своем коде двух(или трёх)летней давности такие комментарии:\n\n1. //легче было написать эту фигню на С......\n2. // где-то здесь должен быть главный большой цикл, но я его потерял :-(\n3. //здесь и далее идут извращения. детям до 16 не смотреть!\n4. //блин.............\n5. //эту функцию НЕ ТРОГАТЬ!!! она каким-то образом работает!\n6. //тум-пурум-пурум, APIлки!\n7. //удалить рука не подымается... пусть будет.\n8. // осторожно! здесь я тупил два дня!\n9. // в принципе здесь можно и без дополнтельного массива, но так както эстетичнее, культурнее ёбаныврот!"},{id:3501,rating:2347,date:"21.03.2008",text:"Инст. Допконсультация. Умаявшийся препод бьется с тупым студентом, в уголке сидит аспирант, жует печеньки, запивает чаем и чатится в аське. Препод, задолбавшись объяснять студенту, что такое полиморфизм, зовет аспера и говорит студенту: \n- Так, смотри сюда! Вот Андрей - это полиморфная функция. Что у него на входе? \n- Эээээ... \n- На входе у него чай и печенье! А что у него на выходе? \n- О_О! \n- На выходе у него, твою мать, строка символов! Андрей, у тебя есть еще что-нибудь поесть? \n- Эээээ... ну, шоколадка есть! \n- Съешь ее! \nОфигевающий аспирант разворачивает шоколадку и начинает ее поглощать. Препод: \n- Вот теперь у него на входе шоколадка. Что на выходе будет? \n- Эээ... \n- Идиот! Щас он доест, сядет за комп и опять будет трепаться! На выходе снова будет строка символов! Хоть его, мать твою, артишоками накорми - на выходе будет строка символов! Он полиморфная функция, сукаааа!!! Понял?"},{id:4403,rating:2198,date:"19.06.2008",text:"Книгу по Gentoo Linux еще надо склеить \n\n(с)max_nya"},{id:694,rating:2154,date:"28.07.2007",text:"Пивабы:\nСхватил виря где-то в апреле. Пропал интернет. Вирей уже давно выловил, интернета нет. Винду переустанавливать ой как не хочется. В другой раздел поставил ещё одну винду - там всё нормально. Интернет АДСЛ. Может кто чем поможет?\nЗЫ От меня этот вирь через квип попал к знакомому (при этом послал сообщение \"Ты п@#ор\" - у него таже фигня, интернета нет.\n\nF0X:\nВдарил свою машину о дерево на повороте, в апреле. Машина перестала ездить. Дерево уже давно спилил, машина все-равно не ездит. Везти в СТО ой как не хочется. Купил другую - та ездит нормально. Машина ВАЗ. Может кто чем поможет?\nЗЫ По моей рекомендации, в соседнее дерево на этом же повороте врезался мой знакомый (при этом, знакомый сообщил мне, что \"Ты п@#ор\" - у него таже фигня, машина не ездит."},{id:11986,rating:2051,date:"26.12.2009",text:"ххх: sudo apt-get install mc  \nххх: ht7Qxfc8  \nyyy: привет  \nххх: блин!!!!  \nххх: меня от твоего \"привет\", чуть инфаркт не схватил!!"},{id:9494,rating:2043,date:"28.03.2009",text:"<Nastya> мне нужна помощь опытных линуксоидов  \n<Nastya> Как правильно отодрать наклейку Windows Vista с нового ноутбука?"},{id:9354,rating:2003,date:"12.03.2009",text:"Единственной кодировкой должна быть UTF-8 а использование других следует приравнять к разжиганию межнациональной розни и карать соответствующей статьёй УК."},{id:771,rating:2000,date:"06.08.2007",text:"<Qwerty> Щас рекламу игры наблюдал. \n<Qwerty> Стоит на скале парень, вдруг за спиной у него появляется дракон с довольной ухмылкой.\n<Qwerty> И тут вдруг пишут название игры \"BLUE  DRAGON\""},{id:622,rating:1946,date:"17.07.2007",text:"Dedy> привет! как дела?\nFessy> привет... нормально, ты кто?? О_о\nDedy> меня Антон зовут! а у тебя есть фото?\nFessy> ясно.. \"приветкагделавышлифото\"...\nDedy> ну так?\nFessy> так, читай внимательно. это мои минусы :\nя - девушка - раз\nкурю - два\nучусь на матфаке Госа, на прогера - три\nтак что моё свободное время я провожу за компом, с пивом, в мятой старой футболке - четыре\nесть плюс - ненавижу билана и прочую попсу, НО из этого пятый минус фри-тайм проходит под хард-рок, альтернативу и метал.\nты всё ещё хочешь мою фотку????\nDedy> Класс! да, хочу!а на чём пишешь? парень есть? а у тя бубен есть ;)\nFessy> пля, нарвалась... ты кем работаешь????\nDedy> одмином...\nFessy> Ну не всё потеряно, читай минусы для тебя - \nя - девушка. - раз.\nя пока ещё учусь на матфаке - два\nя обожаю детей - три\nи самое главное я пишу на бейсике!\n> Dedy удалил себя из вашего списка контактов."},{id:2027,rating:1944,date:"23.11.2007",text:"1arts: Ты че такой дерзкий? \ngnkd: Да я на таких как ты в Марио сверху прыгал!"},{id:2236,rating:1893,date:"08.12.2007",text:"Едет веб-мастер в поезде и слышит: <td></td> ... <td></td> ... <td></td>"},{id:12686,rating:1860,date:"03.04.2010",text:"xxx: Попробуй, поиграй на своем интеле в Quake 4 под линуксом. И сравни с ATI/NVidia. \nyyy: Хм, выглядит просто отлично. Столь же хорошо, как на ATI/NVidia! \nyyy: так, секунду, на подходе второй кадр... Выглядит тоже замечательно!"},{id:6383,rating:1856,date:"31.10.2008",text:"- Что общего между Хэллоуином и Рождеством? \n- Каждый программист знает: 31 oct = 25 dec"},{id:4670,rating:1815,date:"07.07.2008",text:"Цитата \n\nИз книги \"Персональные ЭВМ в инженерной практике\", М. Радио и связь, 1989. \n\n...Одним из примеров громоздкой и, по мнению авторов, бесполезной надстройки является интегрированная система WINDOWS фирмы Microsoft. Эта система занимает почти 1 Мбайт дисковой памяти и рассчитана на преимущественное использование совместно с устройством типа мышь... \n...Таким образом, читатель уже понял, что среди надстроек над ДОС бывают довольно бесполезные системы, которые только выглядят красиво, а на самом деле отнимают время пользователя, память на дисках и оперативную память ЭВМ. Обманчивая красота таких систем, однако, сильно воздействует на неискушенных пользователей, которые не имели практики работы на машине. Инерция мышления бывает столь сильна, что авторам приходилось наблюдать, как люди, начавшие работать с подобной надстройкой, впоследствии с трудом заставляют себя изучать команды ДОС. Хочется предостеречь от этой ошибки читателей ..."},{id:10504,rating:1755,date:"29.06.2009",text:"x> да у вас компьютерщиков, вместо божества Билл Гейтс!  \ny> упаси Торвальдс."},{id:1966,rating:1716,date:"17.11.2007",text:"(разговор в аське про страшные сны)   \n\nA.Vas   \nЭто еще что, вот мне однажды такое приснилось... прям в холодном поту проснулся о_О   \n\nA.Vas   \nНачалось все с того, что у нас в городе вдруг подскочила цена на проезд в маршрутке до 8 рублей... Но собственно действие пошло с того, что мне понадобилось зачем-то съездить в универ. Я сел на маршрутку и поехал. Около нужной остановки подаю 10 рублей кондуктору, она мне отдает 8 (!) рублей сдачи. Я в полном а**е забираю сдачу, выхожу...   \n\nA.Vas   \nНе помню, что я делал в универе... Спустя какое-то время я поехал домой. По пути вспомнил, что неплохо было бы зайти в гости к одному человеку, не помню уже к кому. Не с пустыми же руками идти... Зарулил в супермаркет недалеко от дома, взял там какой-то тортик вафельный за 35 р и пошел на кассу (еще удивился тогда, что ж так дешево). Подаю там этот тортик кассирше, даю 40 р. Она мне дает сдачу двумя монетками - 1 рубль и А рублей!!!   \n\nA.Vas   \nвот тут-то я и проснулся... Главное, взял калькулятор, пересчитал - все сходится: 10h - 8h = 8h, 40h - 35h = B = A + 1!!! я в а**е..."},{id:3708,rating:1705,date:"15.04.2008",text:"1: В курсе, Диман вчера приезжал? \n2: угу, че делали? \n1: Ну помнишь, я ему исходники обещал? Так вот, флеху он забыл, а ему приспичило, щаз говорит хочу, а у меня ни болванки, ни дискеты и модем к серёге оттащил. Так че сделали, ужали в архив поплотней, перегнали в base64 и на принтере распечатали! Говорит, дома файнридером возьму! \n2: а чё курили? \n1: Ниче, тока пиво. А что? \n2: а исходники эти ПРОСТО НАПЕЧАТАТЬ нельзя было? \n1: бляя..."},{id:11993,rating:1667,date:"28.12.2009",text:"vertexua \nКакая коммерческая компания сделала самый большой вклад в развитие open source/free software? \n\nG-UNiX \nНаибольший вклад внесла Microsoft, выпустив Windows Vista.  \n\n(ЛОР)"},{id:10312,rating:1649,date:"09.06.2009",text:"Компания Майкрософт, с целью борьбы с конкурентами создала троянец для линукс, распространяющийся через флешки и интернет, убивающий все личные документы. На данный момент существует только один способ бороться с ним: щелкать \"нет\" в лицензионном соглашении трояна."},{id:982,rating:1593,date:"20.08.2007",text:"July Мишель, привет! ты мне нужен как мужчина!\n Miha ога.\n Miha привет. \n July Как установить в комп Bluetoosh? Чтобы из компа в телефон скачивать всякую шнягу?\n Miha венда какая\n July XP\n Miha SP2 если тоничего делать не нужно. \n Miha само установицо \n July А поподробнее\n Miha подробнее - никак. \n Miha проще приехать и поставить \n July Кому куда приехать?\n Miha где надо установить блютуз? \n July В моем компе в офисе на Красноярской, 40\n Miha  ))))) \n Miha у тебя там че админофф нет? \n July Есть, они такие стерва!\n Miha админы все стерва. особенно когда начинают \"ты мне нужен как мужчина\", а потом выясняется что надо блютуз поставить.. \n July стерва.."},{id:4926,rating:1590,date:"29.07.2008",text:"<typename T> Детский конструктор Lego. \n<typename T> Десткий деструктор ~Lego."},{id:1498,rating:1574,date:"29.09.2007",text:"Описание KolibriOS:\n\nСистема расчитана на использование ассемблера для написания приложений, но есть и программы, написанные на языках Ада, Си, C++, Free Pascal, Forth.\n\nP.S.: После слова \"Ада\" надо было двоеточие поставить! :)"},{id:1942,rating:1560,date:"15.11.2007",text:"Kust (12:40:46 14/11/2007)  \nмама говорит, я в секту вступил =)  \n\ndimet (12:40:54 14/11/2007)  \nпочему?  \n\nKust (12:41:04 14/11/20 ый. View -> Scientific.\n<_MiF_> 2+2*2 - получается 6...\n<_MiF_> Майкрософт рулез :)"},{id:9734,rating:973,date:"19.04.2009",text:"Жители Вилариба выбрали Висту и пошли спать. А жители Вилабаджо всю ночь компилировали ядро Линукс. На утро каждый житель Виларибы почувствовал на себе действие червя \"конфицкер\" и обратился к венерологу, а жители Вилабаджо веселились и качали торренты.  \n\n(c) www.securitylab.ru"},{id:954,rating:972,date:"18.08.2007",text:"\"Поскольку реальное аппаратное обеспечение состоит только из компонентов, описанных в главе 3, то теоретически после прочтения этой главы читатель сможет пойти в магазин, купить кучу транзисторов и сконструировать виртуальную машину Java для целых чисел. Тому, кто успешно выполнит это задание, будет предоставлен дополнительный кредит (а также полное психиатрическое обследование)\"\nЭ.Таненбаум \"Архитектура компьютера\""},{id:9023,rating:972,date:"05.02.2009",text:"xxx: пишу проигрователь и столкнулся с проблемой написания эквалайзера. кто чем может - помогите плиз \n\nyyy: Могу помочь просьбой сформулировать вопрос конкретнее. \n\nxxx: ну короче нужен эквалайзер типа как у винампа. ну там с басами и всем остальным. хотя бы 4-6 полос в эквалайзере \n\nyyy: Нет, мой вопрос в другом. Ты хочешь, чтобы его за тебя написали? Или у тебя конкретный вопрос типа \"Не знаю, как реализовать градиентную заливку у тени, отбрасываемой полосами. Перерыл весь MSDN, нашел только линейный градиент и конический градиент, а мне нужен градиент Безье (скажем)\"? Или у тебя вопрос типа \"Порекомендуйте мне литературу по обработке сигналов - мне нужно реализовать быстрое преобразование Фурье, а существующие реализации меня не устраивают потому-то и потому-то\"? Или? \n\nzzz: Или \"я вставил на форму компоненту 'проигрыватель', где мне найти компоненту 'эквалайзер'?\" =))"},{id:4071,rating:968,date:"24.05.2008",text:"K-21: кст.. ие фо лин - злая тема.. с ним я прошел проверку на сайте МС.. они признали мою убунту лицензионной версией Win я извилинами - по инструкции.   \n\nMacOS X - типа ресторанная еда, за которую дорого просят и от которой может быть изжога, порции маленькие и дорогие, но богема привыкла так питаться и смотрит на всех свысока.   \n\nWindows - фастфуд, быстрое питание, вас обслужат быстро и недорого (по сравнению с рестораном), может быть даже бесплатно, если воспользуетесь ворованной едой, потому что еда быстро \"копируется\". Еда универсальна, потому многие привыкли к генетически измененной пластмассе и считают эту еду лучшей, но не удивляйтесь изжоге, тому что у вас пучит живот или лишай - в фастфудах могут питаться и бомжи, а для максимального комфорта и скорости нет ни дрессконтроля ни фейс-контроля, в результате можете похватить заразу, либо отравится химией и проблеваться с непривычки, но те, кто есть эту еду постоянно - уже адаптировались и привыкли есть антибиотики и протирать тарелки с вилками спиртом и считают это нормой.   \n\nОтмечу, что сам я был и в фастфуде и в ресторанах, но все-равно считаю домашнюю еду лучшей - нужно только уметь готовить! :)"},{id:4713,rating:928,date:"11.07.2008",text:"Звонок на сотовый, незнакомый номер, незнакомый голос: \n\nxxx: Привет, как в Windows в безопасный режим войти? \nЯ, на автомате: F8. \nxxx: Спасибо! \nЯ: А кто это? \nххх: А неважно. \n\nИ трубку повесил :)."},{id:14019,rating:927,date:"21.12.2010",text:"мяусёнак: эти стерва батареи отключили \ndeniska_007: мяусёнак: тебе нужен некто теплый вместо батареи \nмяусёнак: deniska_007: котенок \n[AvataR][w]: одного котёнка мало \nErnesto: кластер котят \n[AvataR][w]: да \n[AvataR][w]: отказоустойчивый котокластер \n[AvataR][w]: с балансировкой тепловыделения"},{id:11083,rating:926,date:"11.09.2009",text:"Самый распространенный способ дебага пятисот строк ассемблерного кода -- очень долгий, очень пристальный и очень задумчивый взгляд."},{id:13326,rating:922,date:"26.07.2010",text:"gvsmirnov: Вот почему композиторов не просят починить рояль, а программистов починить компьютер -- просят! text:"Frantic: сегодня, от нечего делать, решил прочитать состав газированной воды местного производства... \"Буратино\"... состав: ... ... ароматизатор \"Буратино\" идентичный натуральному... ... в шоке...\nMATBEu4: газировка со вкусом полена"},{id:10226,rating:887,date:"03.06.2009",text:"RandoM: Немецкие ученые из Института Фотонных Микросистем (Fraunhofer Institute for Photonic Microsystems) смогли представить прототип устройства, объединяющего микродисплей и очки. Эта штука позволяет пользователям манипулировать данными одними лишь движениями глаз. И если до текущего момента подобные устройства могли только передавать информацию на микродисплеи, то Interactive Data Eyeglasses, подключенные к наладоннику, например, действительно позволят ей еще и управлять. \nMooSE(Work): так и вижу: зашёл по ssh на сервак, случайно моргнул - и нет сервака"},{id:12310,rating:885,date:"10.02.2010",text:"<velavokr> доброго утра, коллеги \n<velavokr> судя по схеме оборудования на %intranet_link%, на высоте 4 этажа над территорией внутреннего двора висит принтер HP LJ P2015n. \n<velavokr> будьте осторожны."},{id:12735,rating:883,date:"12.04.2010",text:"х: Сереж, на какую разведку ты работаешь? \nу: а? \nх: взяла с твоего стола ручку - не пишет, хотела раскрутить что б стержень проверить - она мигать начала. Раскрутила - там микросхема! \nх: я запустила самоуничтожение или оповестила ЦРУ о местонахождении?? \nу: скрути и положи обратно на планшет"},{id:5943,rating:880,date:"08.10.2008",text:"Scull> У нас разные целевые аудитории. Если бы мы тоже использовали GNOME по умолчанию, то да, мы бы отставали. Не нужно сравнивать тёплое с мягким. \nsvu> Не хотите - не будем. Давайте сравнивать зеленое с длинным. В выходящей на днях (к)убунте кде версии 4.х ;) \niRunix> Крокодил больше зеленый, чем длинный \nsvu> 4.2 Крокодил более длинный, чем зеленый! \niRunix> Лемма 2. Крокодил более зеленый, чем длинный. Доказательство. Крокодил зеленый и в длину и в ширину, а длинный только в длину. \nmanntes>...А теперь давайте все вместе померяемся крокодилами. У КДЕ, кстати, символ определённо более зелёный, чем длиный. \niRunix> А символ гнома больше длинный, чем зеленый. Из этого нельзя сделать вывод, что кде=гному, просто они оба не существуют. \nmanntes> Скорее, КДЕ и Гном - взаимодополняющие части сферического крокодила в вакууме \niRunix> Кде+Гном=зеленый длинный крокодил \nmanntes> Да? Может КДЕ - цвет крокодила, а Гном - его радиус? \niRunix> ЛОЛ, крокодил квадратный! У него нет радиуса \nmanntes> Если крокодил квадратный, то кто его ширина и высота? Я предлагаю рассматривать круглого крокодила, ибо он описывается только радиусом. \n\n© Linux.org.ru"},{id:12822,rating:877,date:"26.04.2010",text:"xxx: менять ничего не рекомендую, хрупкий баланс ошибок, компенсирующих друг друга, заставляет программу работать"},{id:9089,rating:852,date:"10.02.2009",text:"agrasteya_ [[email&#160;protected]] зашел на #linux \n<agrasteya_> Здравствуйте. Здесь общаются о гламурных cтразиках? \n<agrasteya_> Меня сюда из #php направили"},{id:11717,rating:850,date:"23.11.2009",text:"xxx \nУважаемый Незнакомый Обитатель Аськи...Если Вы обладаете капелькой фантазии и капелькой же свободного времени, не могли бы Вы поучаствовать в этом опросе (ну очень надо выпендриться на семинаре)))..Просто ответьте на вопрос: с каким цветом у Вас ассоциируется... \n1.Власть \n2.Лидерство \n3.Любовь \n4.Дружба \n5.Надежность \n6.Успешность \n7.Творчество \n8.Работа \nЗаранее спасибо \n\nyyy \nбело-оранжевый, оранжевый, бело-зеленый, синий, бело-синий, зеленый, бело-коричневый, коричневый"},{id:9803,rating:850,date:"25.04.2009",text:"Она: хых.. поставить что ли винду на виртуалку.. только еще линк на этот вирус найти надо... \nОна: верно говорят, на что только не пойдут линуксоиды, чтобы вирус под линь найти.. кто под вайном, кто так выкручиваются.. \nОн: под вайном большинство вирусов падают =) \nОна: угу))  \nОна: теперь я знаю, почему у меня квип под вайном падает))"},{id:5481,rating:846,date:"05. тырёхэтапное согласование соединений, что позволяет в дальнейшем использовать классические атаки по подбору паролей, применимые к WPA2.\" \n\nАноним (1): \nЖдем WPA4? \n\nАноним (20): \nТам также будет откат до WPA3, который с откатом до WPA2..."},{id:18467,rating:52767,date:"10.06.2019",text:"Обращение в поддержку компьютерного магазина. К - клиент С- Сотрудник \nК: Добрый вечер \nК: Можно вопрос? \nС: Вечер добрый! Спрашивайте \nК: У меня сломался женский диск, сколько будет стоить замена у вас? \nКомментарий в рабочем чате: \nС: предложить на мужской поменять? твердотельный."},{id:18360,rating:52463,date:"10.12.2018",text:"opennet, \"Релиз языка программирования PHP 7.3\" \n\nАноним (9): \nЯзык весьма неплохой. В каждой функции есть своя изюминка. Например, при помощи file_exists() можно не только проверить существование файла, но и начать выполнять код, заботливо предоставленный третьей стороной. Удобная фича, рекомендую. \n\nЕсли в вашем языке функция проверки существования файла не способна запускать код, просьба меня не беспокоить."},{id:18433,rating:51825,date:"17.04.2019",text:"xxx: жесть, дожили. обновляю генту на ноуте. дважды сборка chromium падает с одной и той же ошибкой. гуглю. \nxxx: оказывается, это OOM. на 16-гиговом ноуте, с MAKEOPTS=\"-j7\". т.е. ему 2GB на один инстанс cc1plus не хватает. куда скатился этот чертов мир? \nyyy: в будущее ))"},{id:18355,rating:50658,date:"09.12.2018",text:"Между `crontab -e` и `crontab -r` сантиметр расстояния и очень большая разница"},{id:18454,rating:50618,date:"20.05.2019",text:"glados:~ # export LC_ALL=ru_RU.UTF-8 \nglados:~ # run_selftest fire \nПожар лучше всего тушить: водой \nglados:~ # modprobe weatley \nglados:~ # run_selftest fire \nПожар лучше всего тушить: бензином \nglados:~ # modprobe -r weatley \nglados:~ #"},{id:18453,rating:50146,date:"17.05.2019",text:"xxx: Смысл этого поста в том, что необходимо ВСЕГДА проверять данные на входе. Особенно, данные полученные от пользователя \nyyy: Правильным являе которые, по его мнению, должно быть заплачено отдельно. При этом больной становится одержим навязчивой идеей, что все его обворовывают. В большинстве случаев, это сопровождается визуальными галлюцинациями: больному мерещатся некие «пираты». Когда болезнь достигает критической стадии пациент начинает оберегать «свою прелесть» с таким усердием, что поиграть в нее становится затруднительно даже тем, кто честно за все заплатил."},{id:17705,rating:35331,date:"16.02.2017",text:"ххх: 1С изначально проектировалась для небольшого количества пользователей, поэтому оператору предоставлялась бо'льшая свобода действий. \nууу: Я склоняюсь к версии что 1С изначально вообще не проектировалась, а сразу писалась."},{id:17616,rating:34680,date:"31.10.2016",text:"ххх: Вот никогда не верил про несовместимость уборщицы и сервера, а нате: со шваброй прошла, даже не подходя к серверу ближе чем на 2 метра, и рейд отвалился..."},{id:17714,rating:34222,date:"27.02.2017",text:"Новость: в споре, что лучше - AMD или nVidia - один программист зарубил другого топором. \nЛучший камент: Радеон Раскольников."},{id:17414,rating:34205,date:"10.05.2016",text:"xxx: 600 Гб логов? У меня >3 ТБ было. Дальше также место кончилось. Причина: случайно запись в лог внутри цикла написал, вместо вне него. Странно, что оно вообще работало."},{id:17396,rating:32963,date:"18.04.2016",text:"в офисе Apple: \n- Может сделаем новый дизайн? \n- Та не, мы меняли его уже пару лет назад, у кого еще идеи? \n- А давайте исправим глюки на старых девайсах? \n- Зачем? пусть покупают новые! \n- Давайте добавим новые Emoji? \n- Гениально! Так и сделаем!"},{id:17381,rating:32605,date:"31.03.2016",text:"Дело в том, что любые новые фичи C++ должны пройти через комитет трёх фанатиков. \n\nПервый фанатик обожает исключения. Всё собрание этот ворчливый старик кажется спящим, но в самый неудобный момент вскакаивает и перебивает говорящего криком «и тут мы бросаем исключение!» После этого конечно всё ломается. Этот старик мало кому нравится, но все вынуждены его терпеть. \n\nВторой фанатик обожает шаблоны. Любую фичу он нежно оборачивает в шаблоны, которые заворачивает в шаблоны, которые заворачивает в шаблоны… пока она опять не сломается. В свободное время пытается написать программу по вычислению смысла жизни и вообще на этапе компиляции. \n\nТретий фанатик, самый молодой, обожает всё параллельное. В отличие от других, он не критикует сразу. Он с энтузиазмом хватается за предложенную фичу, сразу переводит его в параллельность, убеждается что всё ломается и со вздохом «в наш век параллельного программирования так делать нельзя» отправляет фичу в корзину. Говорят, у него множество личностей, которые друг перебивают часто друга."},{id:17475,rating:32178,date:"09.07.2016",text:"<L29Ah> [[ clang++ == *g++ ]] && echo yay \n<L29Ah> yay \n<Minoru> «*g++»? Указатели в моём шелле?"},{id:17394,rating:31827,date:"16.04.2016",text:"xxx: Саша, речь не о том, что теоретически возможно прочесть произведения классики, и даже есть те, кто прочитывает. Мануал администратора фриБЗДи Ты тоже, наверно, одолел, и возможно, что на одном дыхании - Ты станешь на этом основании утверждать, что рекомый мануал есть выдающийся памятник словесности, написан легко, увлекательно и очень душевно? \n\nyyy: Мануал администратора фрибсд, сравнительно с оракловой документацией, это выдающийся, мать его так, памятник словесности. Написан легко, увлекательно, и очень душевно."},{id:17213,rating:30879,date:"16.09.2015",text:"[23:56:12] r@ttler: ico это древнее дрянь начала девяностых, которое давно пора выкинуть \n[23:56:21] ZimM: низзя. совместимость! \n[23:56:40] r@ttler: ну только потому это зомби еще и используется \n[23:56:49] ZimM: а чем он так плох? \n[23:57:01] r@ttler: ибо впихнуть туда тупо сырым потоком пнгху вместе с заголовками - это уже не то что костыль. это целый вольтрон из костылей \n[23:57:22] r@ttler: пять программеров мс собирается вместе, смыкают костыли и рождается этот формат"},{id:17650,rating:27605,date:"16.12.2016",text:"На новость о том, что начало продаж беспроводных наушников Apple AirPods отложили на 2017 год из-за проблемы с синхронизацией звука в разных наушниках: \n- Делов-то. Надо следовать заветам Джобса, заявить: \"Просто не слушайте оба наушника сразу\" и запускать в продажу"},{id:17707,rating:27249,date:"17.02.2017",text:"xxx: У меня сейчас такое странное чувство \nxxx: Вот представь, что ты летишь на самолете. И вдруг ты узнаешь, что двигатель прикреплен к турбине резинкой от трусов \nxxx: Вот я сейчас прочитал доки ACPI и очень похожее чувство возникает \nyyy: Гы. А что там? \nxxx: Там описание бинаря в BNF. И в нем циклы. \nxxx: А еще виндовом парсере бага. А производители железа пишут ACPI для своего железа по принципу \"на винде работает, значит сойдет\" \nxxx: Итого, 60% таблиц не соответствуют стандарту \nyyy: Тогда это тебе только кажется, что это резинка от трусов. Это резинка от трусов только по документации и внешнему виду. На самом деле это рисунок резинки от трусов, напечатанный на туалетной бумаге"},{id:17631,rating:26133,date:"18.11.2016",text:"из тикета на гитхабе \nxxx: в итоге решил проблему через xclip и fold. боже, храни линукс, в котором можно починить всё что угодно, собрав очередной велосипед из костылей и серого скотча \nbbb: у нас это называют гибкость"},{id:17652,rating:25961,date:"26.12.2016",text:"комментарии к новости \"Релиз FreeDOS 1.2\" \n\n>>>> размер загрузочного iso-образа - 418 Мб \n>>> Сколько сам freedos весит? \n>> Я думаю, около мегабайта. \n> А всё остальное - это что? \nЛицензионное соглашение."},{id:17646,rating:25896,date:"10.12.2016",text:"Когда читаешь про интеграшки Intel GPU, радуешься. Вот была новость что оконательно допилили OpenGL 4.5, теперь наращивают производительность недавно добавленных расширений. И в ядро они коммитят много в графический стек. И gpu-tools, не уступающие виндовым, и разрыв в производительности с виндой - минимальный. KMS, Wayland, Glamor. Нет разве что Gallium. \n\nА потом ты вспоминаешь :16254,date:"16.04.2020",text:"opennet, \"Выпуск Kubernetes 1.18, системы управления кластером изолированных контейнеров\" \n\nАноним (6): \nСовременные кубернетесы позволяют решать такие проблемы, которых до изобретения кубернетесов не существовало."},{id:17092,rating:16127,date:"11.05.2015",text:"xxx: че сегодня делаешь? \nyyy: self.work.tasks.map { |task| task.do! }.map(&:to_money).sum.send_to(self.credit_card)"},{id:18700,rating:15984,date:"14.02.2021",text:"xxx: а у нас чувак программер был до этого коллектором \nyyy: странно, что в программеры пошел - ему бы в QA, писал бы программерам на дверях в квартиру \"технический должник\""},{id:18608,rating:15648,date:"04.04.2020",text:"opennet, \"Сквозное шифрование в системе видеоконференции Zoom оказалось фикцией\" \n\nАноним (4): \n> Представители Zoom пояснили, что под end-to-end шифрованием подразумевали шифрование трафика, передаваемого между своими серверами \n\nПредставители Zoom пояснили, что под безопасностью своего продукта имели в виду отсутствие ГМО и канцерогенов."},{id:18588,rating:15296,date:"21.01.2020",text:"xxx: \nСамая ржака начинается, когда у сисадмина дома начинаются проблемы с кабельным интернетом и он звонит в техподдержку, а его просят перезагрузить роутер по питанию и всячески отрицают, что проблема на стороне провайдера. А еще, узнав что вместо их фирменного роутера (китайского дрянь по цене циски), стоит какой нибудь самопальный шлюз на фряхе или какой нибудь микротик, начинают говорить - мы это оборудование не поддерживаем и вообще вы сами во всем виноваты. Сцена напоминает сцепившихся котов в борьбе за территорию."},{id:18618,rating:14812,date:"26.05.2020",text:"xxx: Всем здравствуйте, вопрос такой полез куда не надо и разбудил тв бокс по wol, тот в свою очередь разбудил телек по сес - буду дома тока дней через 10. А отключить его никак чере wol? Спасибо. \n\nyyy: Хорошо, что утюг нельзя по wol разбудить"},{id:18637,rating:14802,date:"07.08.2020",text:"xxx> Добро пожаловать в нашу больницу. \nxxx> Вы наш новый хирург? \nxxx> Впрочем, неважно, в нашей организации нету титулов. Главное - не образование, а что вы умеете. \nxxx> И процессы у наш тоже оптимизированы, никакого waterfall, все agile. \nxxx> Поэтому мы не тратим много времени на обследование и анализ, а сразу оперируем, потом учимся на ошибках и делаем новый виток. Будет постоянный поток улучшения пациента. \nxxx> До операции - подготовите все инструменты. А после - накормите пациента и вымоете в палате полы. Да, сами. Уход за пациентами - это не роль, а культура. Все должны в равной мере этим заниматься. \nxxx> А заодно это освободит время наших сестер и санитаров развивать свои навыки. Время от времени вы будете работать в паре - они режут, а вы наблюдаете. А как же еще им научиться? \nxxx> И напоследок, мы постепенно отказываемся от общего наркоза. Простой наших пациентов не приветствуется, нам нужно научиться оперировать, пока они заняты своим делом, как обычно. \nxxx> Всего хорошего!"},{id:18590,rating:14627,date:"29.01.2020",text:"xxx: Решил буду программистом, чегоб почитать ? \nyyy: психобльница в руках пациентов - нормально для старта \nxxx: дурак, нах мне психитария \nyyy: какая психиатрия, это о программировании. В психиатрии все примерно понятно что нормально а что нет. В ИТ отрасли забудь эти термины. телепатия , гадания, телепортация, шаманские ритуалы - это может быть всего лишь утро какого нибудь вторника. А тех кто пережил деплой в пятницу вечером вообще из нирваны уже ничто не выведет"},{id:18603,rating:14408,date:"13.03.2020",text:"vc.ru, \"Исследование: рынок онлайн-образования в России может достичь 60 млрд рублей в 2020 году\" \n\nDmitry Egorov: \n> Стань программистом за 3 месяца и 42 000 рублей. \nА потом малюсенький сайтик выжирает 1,5 гигабайта оперативки, но продолжает жутко лагать. \nПочему это на врача за 4 месяца выучится нельзя?.. \n\nAnderson Silva: \nпотому что от врача зависит жизнь человека и уголовно наказуемое деяние, а то, что сайтик много кушает это не так страшно \n\nDmitry Egorov: \nСебя именно так и успокаиваю, когда какая-то наша софтина перестаёт нормально работать: \"Я спас сотни жизней, когда решил стать программистом вместо врача\""},{id:18614,rating:14005,date:"15.05.2020",text:"V: А ещё мне тут пришла в голову правильная аналогия про Vim \nV: Это короче так: садишься ты в машину, а там вместо руля и педалей стоит БАЯН \nV: И каждая кнопка что-то означает, типа: - вперёд 100 м - вперёд 1 км - вперёд до ближайшего светофора - вперёд до отделения полиции - обогнать впереди едущую машину \nV: И ещё когда ты садишься, двери блокируются и надо тоже нажать последовательность кнопок на баяне, чтобы выйти \nV: А если в движении случайно нажмёшь esc и выйдешь из режима движения, то вместо движения вперёд машина бибикает \nV: И соответственно есть прокачанные баянисты, которые ездят по дорогам, играя мелодии. Быстро, эффективно ездят"},{id:18591,rating:13338,date:"11.02.2020",text:"xxx: \nDemo-driven development (Triple-D) - технология, в соответствии с которой фича сначала пишется на левой коленке с единственной целью как-нибудь скрестя пальцы продемонстрировать её заказчику, затем пятнадцать раз переписывается в соответствии с изменениями требований (и обязательно демонстрируется после каждого изменения) и только после того, как заказчик удовлетворился, костыли заменяются протезами, а велосипеды делаются по ГОСТу."},{id:17433,rating:13282,date:"25.05.2016",text:"SIGQUIT — «эммм… процесс… не мог бы ты остановиться, пожалуйста… если не сложно…» \nSIGTERM — «твое время вышло! Убери за собой и шагом марш с памяти, да поживей!» \nSIGKILL — приходит лесник и хреначит дубиной по голове, а труп выбрасывает медведям."},{id:17397,rating:13253,date:"20.04.2016",text:"SQPR: У меня ещё один ленточный робот сломался... Меньше, чем за неделю. \nПослали человека чинить робота в библиотеке, с тех пор он что-то не выходит на связь... \n\nKeeper: Я думаю, робот одержал верх. \n\nSPQR: Так и придётся самому в Мск ехать. Я, если что ась примерно 45 лет назад. Но до сих пор начинающие юниксоиды плачут, смеются, продолжают есть кактус и писать свои впечатления от пользования сим незабвенным софтом. Вы спросите,- какие вообще могут быть впечатления от пользования текстовым редактором? Ха-ха три раза, дети юзер френдли интерфейса, адепты Джобса и Гейтса... Это нельзя рассказать, это надо прожить и первый раз незабываем! Большинство сейчас, конечно, используют уже vim, а многие даже и не знают, что даже \"классический\" vi это суть есть визуальный режим редактора ex, который является упрощенной версией редактора en, который является модифицированной версией редактора em, который был создан потому что популярный на тот момент редактор ed БЫЛ СЛИШКОМ СЛОЖНЫМ ДЛЯ ПРОСТЫХ СМЕРТНЫХ. Современные IT технологии слишком сложны? Тогда подумайте о том, что ВИЗУАЛЬНЫЙ режим в ТЕКСТОВОМ РЕДАКТОРЕ был не всегда. И был текстовый редактор без визуального интерфейса, который уже не казался слишком сложным \"простым смертным\". И в этих редакторах были написаны программы и расчеты, позволившие отправить людей на Луну. Нет, мир и технологии не стали слишком сложными для человека, просто, перефразируя Михаила Юрьевича, богатыри - не мы. Но, не все потеряно, ведь раз vi запускают, значит это кому-то нужно!?"},{id:17423,rating:6934,date:"17.05.2016",text:"xxx: а. походу нашел:  \nxxx: // Тут начинается костыль, я надеюсь очень временный  \nxxx: вот по этому тексту можно найти  \nyyy: 5 matches"},{id:18708,rating:6872,date:"10.03.2021",text:"nozh: Использование any в TypeScript - это ну на совсем крайний случай, нужно огораживать обёртками и сводит на нет выгоду от использования строгих типов. Типичный случай: «TypeScript указал на несоответствие типов, я нифига не понял и не стал разбираться, нашёл на стековерфлоу что нужно вставить as any, заработало». \nnozh: В идеале каждое использование as any должно требовать 20 подтягиваний, что бы его могли использовать только самые сильные программисты."},{id:17421,rating:6832,da ние железяка уделяла ей. Вертела камерой, зумила и забивала болт на все иные раздражители. Вела запись всех перемещений коровы и уведомляла меня, что в кадре группа людей готовит грабёж моей дачи.  \n\nПеревесил на другую сторону, там камера решила следить за скворцами. Мне это надоело и я её сменял на неумную."},{id:18942,rating:1457,date:"26.01.2022",text:"xxx: На днях пишу код, ем банан, подходит коллега, спрашивает, на какой ветке я сижу. Похоже, эволюция свернула куда-то не туда."},{id:18950,rating:1454,date:"20.02.2022",text:"<xxx> А ты не пробовал приводить код в человеческий вид? Расставлять отступы, добавлять комментарии и всё такое? \n<yyy> Зачем? Я же не пишу програмы для кого-то, я просто кожу под себя. \n<xxx> Знаешь, такое впечатление, что сейчас все программисты кодят под себя."},{id:17392,rating:1434,date:"12.04.2016",text:"Уж казалось бы всё повидал в Майкрософтовских продуктах, ан нет. Exchange порадовал предупреждением: \n\n\"(!) Если в организации Exchange 2010 также работает сервер Exchange 2003, отключение соединителя может привести к зацикливанию    маршрутизации. Exchange 2003 не распознает, что соединитель отключен, и будет продолжать выполнять на него маршрутизацию.\" \n\nИ кнопки ниже: \n\n[Да]  [Да для всех]  [Нет]  [Отмена] \n\nВыглядит как вопрос на ЕГЭ по программированию."},{id:18946,rating:1424,date:"31.01.2022",text:"Когда \"русифицированный\" Нортон Командер при попытке удалить с дискеты файл строго спросил \"Следующий файл единственно читаемый. Вы ещё хотите удалять это?\" - я таки проверил. Нет, не единственный. Остальные файлы на дискете тоже ещё читаются. А так-то грустно, конечно - удалить единственный из всей дискеты читаемый файл."},{id:17383,rating:1411,date:"02.04.2016",text:"xxx: Делаю коммит очередной доработки, Гит присваивает ему версию e6a3dec. У меня плохое предчувствие..."},{id:17382,rating:1397,date:"31.03.2016",text:"*Обсуждение использования оперативки различными ЯП* \nxxx: вот представь: аккуратный стол, белая т своего давно почившего дедушку увидел...\nИнтересно, что обо мне подумал шеф? Видя меня, \nвыходящего из сортира с документами в руках, \nостанавливающегося и ржущего. И что @ля подумала \nстажерка из бухгалтерии??\nfrom Ligor"},{id:81,rating:2769,date:"18.07.2025",text:"xxx сменил свой ник на ВНИМАНИЕ\n* ВНИМАНИЕ ! Произошла критическая ошибка! Немедленно нажмите ALT+F4, чтобы ее\nисправить!\n* yyy ушел с канала [\"Ooops (EOF)\"]\n* zzz ушел с канала [\"Quit\"]"},{id:234,rating:2577,date:"18.07.2025",text:"J. X. R.: жесть... Подходит большое начальство смотреть на работу проекта, смотрит мне уже через плечо, а я лихорадочно убираю комменты \"Работает, стерва\" и \"Тут пойдем через попа\". Вроде все убрал, запускаю и вижу, что имя окна - \"Аццкий сукапроект v. 0.9\" Чуть не поседел.."},{id:188,rating:2275,date:"18.07.2025",text:"<Astronix> подскажите прогу через каторую можно посмотреть какой процесс использует 80 порт\n<netstat> хз"},{id:450,rating:2143,date:"18.07.2025",text:"<ssd.meister> Когда я сказал студентам принести лабу по алгоритмизации на любом языке программирования, я не подозревал, что на потоке найдётся дурак, который напишет её на.. BRAINFUCK'е!"},{id:500,rating:1929,date:"18.07.2025",text:"<Sc0v> ЙРН  МХРЭ ОНДШЛЮК ВРН МХРЭ МЮ Gfs ? \n<ежевичное> ондшлюк?\n<Sc0v> ОНДШЛЮК= ГЮОСЯЙЮК, МЮЯРПЮХБЮК\n<ежевичное> я теперь знаю, что такое ондшлюк"},{id:230,rating:1550,date:"18.07.2025",text:"<Melkiy> парни вопрос я вот скачал с kernal.org ядро оно будет писать на ntfs ?\n<amazing> ага, кипятком"},{id:255,rating:1451,date:"18.07.2025",text:"<xxx> ппц!\n<yyy> че?\n<xxx> Сервак рухнул\n<yyy> КАК?\n<xxx> Просто рухнул\n<yyy> Ну чё с ним? взломали?\n<xxx> нет\n<yyy> Свет вырубили?\n<xxx> нет\n<yyy> Мля взорвали чтоль?\n<xxx> нет\n<yyy> Ну а чё тогда?\n<xxx> Сервак переносили на 9 этаж, Серега споткнулся об шнур бесперебойника и сервак рухнул с 7-го.\n<yyy> ппц"},{id:111,rating:1442,date:"18.07.2025",text:"<OSA> привет, у кого есть KolibriOS?\n<ZLord> привет\n<Krozavcheg> wtf\n<[bod]> wtf?\n<OSA> че за wtf?\n<Krozavcheg> сокращение от \"What the fuck?\"\n<OSA> а что это?\n<[bod]> :)))\n<Krozavcheg> \"Что это за хрень?\"\n<OSA> да, поясните плиз\n<[bod]> )))) wtf переводится как \"что за х@йня?\"\n<OSA> теперь врубился. так есть у кого нибудь KolibriOS?\n<[bod]> нету\n<OSA> а у остальных?\n<Krozavcheg> omg\n<Krozavcheg> ytne\n<ZLord> ytne\n<OSA> а вы можете НОРМАЛЬНО сказать?\n<OSA> где только словечек таких понахватали?\n<[bod]> rtfm\n<ZLord> ппц\n*OSA покинул канал (:Quit.)\n<ZLord> LOL )))\n<Krozavcheg> wtf kolibrios?\n<[bod]> ХЗ ж)"},{id:363,rating:1259,date:"18.07.2025",text:"Админы, блин...\nПринес хард с убитым разделом, попросил наших админов вытащить инфу. К концу дня подхожу, один админ мне говорит: 7,6 Гб... как тебе ее скинуть? говорю, разбей на две болванки, он говорит нет болванок, могу на 40 Гб кассету стриммерную записать (и улыбаясь достает из ящика стола кассету)... я говорю издеваешься? где я стриммер возьму?... тут он достает из ящика стола... правильно - стриммер! сказёвый... я смеюсь, говорю - здорово, тогда давай контроллер тоже... ну вы поняли, да? он достает из ящика КОНТРОЛЛЕР, ШЛЕЙФ И CD С ДРАЙВЕРАМИ... вся комната под столами..."},{id:250,rating:1236,date:"18.07.2025",text:"scorp_ua:\nя вчера чистил свой монитор. \n\nscorp_ua:\nв общем, снимаю я заднюю крышку, а на её обратной стороне написано:\"Do not remove this cover!!!\"\n\ncryostasis:\nжелезная логика :D"},{id:77,rating:1220,date:"18.07.2025",text:"Lubasha: прикинь только собираюсь тебе писать меня вырубают и вчера тоже. Боюсь за это послание\n\nLubasha: О! Дошло!!!! Слушай, у меня тут проблема.\n\nIwan: Минутку... {shutdown -s -m\\\\lubasha.inter.local -f -t 01}\n\n*Lubasha has quit"},{id:285,rating:983,date:"18.07.2025",text:"<Haku> знаешь....наш класс дибилы..\n<Haku> сегодня на инфе, у меня на компах консоль открыта...\n<Haku> ПАЧЕМУ блин НЕЛЬЗЯ СПРОСИТЬ, НАДО РЕСЕТ ЖАТЬ????\n<helendile> патамушта ой! страшнаааа\n<Haku> потом на вопрос нах  без сетки - это отличная идея?\nyyy: Да понимаешь, было так душно, что мы решили, что даже такая мелочь, как сетка, не должна мешать воздуху гулять.\nxxx: Гениально. А теперь, пожалуй, иди полей ту герань, которую вы заботливо высадили в капот нашему главному бухгалтеру."},{id:32961,rating:1,date:"09.03.2026",text:"Ну, мои сослуживцы — те ещё хитрецы. Месяц назад я с ними из-за чайника бился: захожу на кухню – вечно пустой. Мол, выпил – так и долей, ё-моё. И что вы думаете? Через месяц эти гении нашли золотую середину: оставляют ровно на одну кружку. И опять мне воду греть."},{id:32952,rating:1,date:"09.03.2026",text:"Тоха: Вообще, я бы в армию рванул, но хочется еще и в магистратуру залететь.\nТоха: Да и работать надо.\nСульфурчег: Ну и зачем?\nСульфурчег: Это все какой-то поганый вирус – \"люблю Родину\".\nТоха: Да какой к черту \"люблю Родину\"? Я просто хочу кого-нибудь покрошить!"},{id:32938,rating:1,date:"08.03.2026",text:"xxx:\nЗаказала как-то суши онлайн, а курьер мне устроил целый ликбез, что мол, я, покупая рыбу, спонсирую насилие над невинными существами, и вообще, я убийца. И всякие проповеди про отказ от мяса и суши, плюс кучу макулатуры мне в руки сунул. :blink: Отделалась от него – звоню оператору, жалуюсь. И тут слышу в трубке: \"Минуточку... (где-то на фоне раздается вопль) Какого черта его до сих пор не уволили?!\" :D"},{id:32860,rating:1,date:"04.03.2026",text:"Обосрался от страха\" — это, знаете ли, не совсем элегантно. Правильнее будет сказать: \"Объявил о повышении цвета тревоги до шоколадного\"."},{id:32842,rating:1,date:"03.03.2026",text:"**BigSergo:**\nНе бойтесь, к октябрю биткоин как огурчик в банке, поднимется до 70 тысяч.\n\n**Den_X:**\nДержу пари на сотку зелёных, что к первому октября он ниже 70-ти останется.\n\n**IvanP:**\nС удовольствием оформлю ваши страховки, по трёшнику с каждого."},{id:32835,rating:1,date:"03.03.2026",text:"Коллеги подарили на ДР кактус. У нас в офисе, знаешь ли, не курорт: света мало, сквозняки гуляют. Пришлось мне его домой забирать.\n\nПятница, вечер. Спускаюсь в метро с двумя девушками и этим колючим счастьем в горшке. Тут подходит к нам один такой, слегка подшофе, и как присмотрится к кактусу, потом ко мне, потом к девчонкам...\n\nИ выдает, в полном недоумении: \"А кактус у вас, простите, тоже девочка, или он все-таки парень?"},{id:32794,rating:1,date:"01.03.2026",text:"Я изо всех сил пытался собрать из этих слов хоть какую-то рифму, но в итоге призвал только самого черта. Он, бедный, развел руками, сказал, что таким матом его тоже не зовут, и растворился обратно в неизвестность, где-то между Омском и преисподней."},{id:32725,rating:1,date:"26.02.2026",text:"xxx:\nТачку за копейки взять — не проблема.\nДругой вопрос — а тебе оно надо?\nЕсли ты только учишься рулить, то надо, чтоб она ехала, а не разбиралась по запчастям.\n\nyyy:\nУ нас тут пацаны на такие \"копейки\" заглядываются, чтоб в ней тусоваться, пока электричка не придет. Типа, мобильная \"зона ожидания\" с крышей. :lol:"},{id:32683,rating:1,date:"24.02.2026",text:"xxx: Есть гениальный метод, чтобы понять, врут твои напольные весы или нет! Взвесься, потом опрокинь литр пивка, и снова на платформу!\nyyy: Ну, вообще-то, точнее будет взвесить бутылку с литром воды.\nxxx: А я и не говорил \"точный\", я говорил \"лучший\"!"},{id:33120,rating:0,date:"16.03.2026",text:"Сижу я, значит, на детской площадке, сынуля мой там с одной девочкой на карусели кружится. Думаю: \"Вот молодец, растет у меня настоящий кавалер, можно и похвалиться!\" Но не тут-то было. Через пару минут мой рыцарь останавливает эту карусель, девочку ссаживает, сам туда плюхается и таким царским тоном заявляет: \"Я тебя покатал, а теперь ты меня покатай!"},{id:33118,rating:0,date:"16.03.2026",text:"ххх: Я всё никак не угомонюсь, глядя на этих фанатов старинных картинок, где нарисовали каких-то \"динозавров\".\nххх: Ну, вы даете!\nххх: Серьезно, существа на рисунках больше на динозавров смахивают, чем на верблюдов?\nххх: Да уж, средневековые книжки с картинками — отдельная песня.\nххх: Там, порой, такое нарисуют: будто Ктулху на полном отлете из уклейки себе костюм сварганил.\nххх: А подпись — \"Осьминог\"."},{id:33116,rating:0,date:"16.03.2026",text:"Перевод часов обратно? Знаете, это так напоминает мне наших любимых разработчиков игр. Те, которые вроде как что-то там переделают, а потом, когда все уже привыкли и потратили кучу времени и сил на адаптацию, вдруг такие: 'А давайте всё вернем как было!"},{id:33115,rating:0,date:"16.03.2026",text:"Препод: Собственный класс, знаешь, что это такое и когда он нам пригодится?\nСтудент: Ну, это такое хитрое множество, которое само по себе — не часть никакого другого множества. Это как бы наш способ избежать путаницы в старых теорийках.\nПрепод: Ладно, давай, приведи пару примеров.\nСтудент: Эээ... Тут загвоздка. Если я приведу пример, он сразу станет \"частью\" нашего разговора, то есть элементом. А первый же принцип этого вашего класса — \"ни за что не быть элементом\"! Так что, никак."},{id:33114,rating:0,date:"16.03.2026",text:"– Ну что, сколько там в жиме лежа давишь?\n– Около двух сотен.\n– Вот это силач! А по виду и не скажешь.\n– Так это за всю неделю, понемногу."},{id:33113,rating:0,date:"16.03.2026",text:"Утренник в садике, на сцене — воспитательницы.\nЕстественно, кто бы мог подумать, пора звать Деда Мороза! Выходит он, весь при параде: халат, шапка, борода, посох. И такой, значит, спрашивает:\n— Дети, а кто я такой?\nДети хором:\n— Ирина Анатольевна!"},{id:33112,rating:0,date:"16.03.2026",text:"ххх: Программа – это такой странный зверь:\nв ней старый, проверенный друг уже не водится,\nзато в суете непонятной и суетливой\nорудуют всякие, кто попало..."},{id:33111,rating:0,date:"16.03.2026",text:"xxx: Купили самую огромную кровать, 180 на 210. Думали, там полкоманды уместится. И вот почему, мать его, нам сейчас на ней места не хватает?\nyyy: Наверное, у вас есть коты?"},{id:33110,rating:0,date:"16.03.2026",text:"ххх: Интересно, а на огонь есть какие-то авторские права?\nууу: Ага, Прометея уже подвели под статью за пиратство."},{id:33109,rating:0,date:"16.03.2026",text:"xxx: Эти наши ЖКХ, ей-богу, похоже, специально выжидают, когда на улице льет как из ведра и мороз трещит, чтобы тут же вырубить нам горячую воду и батареи. Прям закон подлости какой-то!"},{id:33108,rating:0,date:"16.03.2026",text:"Instagram, значит, выдает фото: туманное поле, в центре – лошадь. Подпись, естественно, на английском, полная пафоса и глубокомысленных рассуждений о сущности табунов. И под этим всем – море восторженных комментариев: \"Как изящно!\", \"Какая мудрость!\", \"Настоящая философия!\". И тут, как вишенка на торте, один русский комментарий: \"Ой, ёжик!\"."},{id:33107,rating:0,date:"16.03.2026",text:"xxx:\nБыл у меня один кавалер, который заезжал по вечерам, опустошал холодильник, ночевал, утром доедал остатки и сливался. Так и ездил, пару раз в неделю. Я, честно говоря, не парилась, только вот продукты таскать потом становилось влом. И вот как-то в субботу проснулась, говорю ему: \"Слушай, дорогой, пойдем вместе на рынок, затариться на неделю, мне одной тяжеловато\". Он такой: \"Без проблем! Только мне сейчас срочно надо одно дельце провернуть, через пару часов буду, и пойдем\". Больше я его, конечно, не видела."},{id:33106,rating:0,date:"16.03.2026",text:"xxx: Слушай, а сколько эта игрушка весит, примерно?\nyyy: Ну, гигов десять, наверное.\nxxx: Ого. А с торрентов долго будет качаться?\nyyy: Ага, долго.\nxxx: Тогда, может, ты мне её на почту закинешь?"},{id:33105,rating:0,date:"16.03.2026",text:"xxx: Сегодня в школе какой-то батюшка объявился.\nxxx: Видать, пришли детей в вере укрепить.\nxxx: А тут такое дело – малышня с криками \"Дай баф на выносливость!\" за ним понеслась."},{id:33103,rating:0,date:"16.03.2026",text:"Гром: Пришла мне тут в голову одна история, как сынок одного очень богатого папаши звонит и верещит: \"Папка, срочно на Южный полюс партию белых медведей закинь, я в географии полный ноль!\"\nLynx: И что, это всё из-за новых правил? )\nГром: Ну да...\nГром: Похоже, кто-то на экзамене по жизни провалился."},{id:33102,rating:0,date:"16.03.2026",text:"Удивительная картина маслом: бреду по деревне, вижу чудо отечественного автопрома, обутое в летнюю \"обувь\" (ну, вы понимаете). За рулём – какой-то алконавт, явно собирается покорять просторы. А у распахнутой двери – бабуля, крестит его и бормочет: \"Чтоб дорога была гладкая, как ляжка младенца!\" Ну, цирк, ё-моё."},{id:33101,rating:0,date:"16.03.2026",text:"Мы, как небо и земля, а всё равно по уши вляпались."},{id:33100,rating:0,date:"16.03.2026",text:"Два заядлых геймера заявились за 22-дюймовым монитором Samsung. Начали, понятное дело, копаться в пикселях. Нашли один битый, прямо по центру. Ну, ради прикола решили проверить, точно ли он там, перезагрузили комп. И тут – вот те на! – стрелка курсора легка и непринужденно указывает точно на эту бяку. Парни чуть с ума не сошли от восторга, мол, теперь в \"Контру\" и прочую чушь рубиться – одно удовольствие! Готовы были меня на руках носить, честное слово!"},{id:33099,rating:0,date:"15.03.2026",text:"Коль, глянь ноут, как время будет.\n\nФото закинул, видишь, вокруг кнопки развод?\n\nОк.\n\nКажется, отдраил.\nНа вкус напоминает мыло.\nИли что-то такое.\n\nВо вкусе???\n\nАга, я ценитель прекрасного."},{id:33098,rating:0,date:"15.03.2026",text:"Катя: Я дрыхла как сурок. Часа три. Тут как заорет звонок, аж в ушах зазвенело. Вышла – бабка какая-то, свою старую приятельницу ищет, которая когда-то тут околачивалась. Только вот адрес у нее в голове – полный бардак. Я ей, конечно, еще подкинула сомнений.\n\nАндрей: Да это ж твоя подруга из будущего! Из 2065-го. Просто в прошлое занесло, бывает.\n\nКатя: Неее, она Ольгу искала.\n\nАндрей: Ну, за столько лет и забыть, как подругу зовут, это уже не прогресс, а регресс."},{id:33097,rating:0,date:"15.03.2026",text:"xxx: Вирус, ливень, гроза.\nxxx: Сегодня наглядная карта погоды\nxxx: Вместо обычного значка\nxxx: Загрузила вопросительный знак.\nxxx: Что-то я очкую."},{id:33096,rating:0,date:"15.03.2026",text:"Z: Да я тут два дня с программистами-саб-лидами ковыряюсь, оцениваю их, так сказать, \"первосортность\".\nS: Охренеть... Ты даже по-русски разучился изъясняться, небось."},{id:33095,rating:0,date:"15.03.2026",text:"xxx: есть идеи, как по-русски передать \"unfuck\"?\nxxx: видишь ли, к \"ёб\" ни одна приставка не прилипает так, чтобы получилось \"разёб\", а не \"ещё более ёб"},{id:33094,rating:0,date:"15.03.2026",text:"xxx: В преисподней, знаешь ли, не тела пылают, а души. А душам, знаешь ли, много места не нужно. Теоретически, ад может быть сжат до размеров той самой точки, из которой всё началось.\nyyy: А как же тогда котлы, сковородки, плиты, шампуры? Вся эта атмосфера, этот кулинарный рай с запахом жарящегося мяса, от которого слюнки текут. Неужели это всё просто воображаемое? Нет, я в это не поверю ни за что."},{id:33093,rating:0,date:"15.03.2026",text:"Человек-паук – он типа с суперсилами или с прибабахом?"},{id:33092,rating:0,date:"15.03.2026",text:"Мать: - Доча, тут один тип, такой интересный, с голосом, как у соловья, зовет меня на свидание. Я прям в растерянности.\nДочь: - А чего ты терзаешься?\nМать: - Ну, знаешь ли, с незнакомцем в его тачку прыгать и в закат укатить – это как-то, прости, несерьезно.\nПосидели, подумали.\nМать: - Ладно, уговорила. Поедем на моей.\nДочь: - О, да! А если что, я вас на горячую линию сдам!\nМать: - И тут мой мозг начал рисовать картины маслом, как я объясняю операм:\n- Здравствуйте, это я. Моя мама похитила незнакомого мужчину и увезла в неизвестном направлении.\n- Да, кстати, он, похоже, из органов.\nДругой: - Это просто уморительно! Я до сих пор ржу."},{id:33091,rating:0,date:"15.03.2026",text:"Наш клан в ММО затеял в реале сходку, 16 душ из одного города. А наш зам, Gulag, припер свою мазню – холст метр на полтора. На нем Архип, наш вечно глючащий парень, в припадке ярости громит клаву головой. Подписано: \"Архип и Лаг\". Вот такое вот искусство в подарок."},{id:33090,rating:0,date:"15.03.2026",text:"xxx: Дают на \"Дембельском альбоме\" песню \"У меня появился другой\".\nxxx: Ну, типа, намёк поняли."},{id:33089,rating:0,date:"15.03.2026",text:"Ну, некоторые особо привередливые клиенты за тараканьи супы даже платить отказываются. А другие, видать, предпочитают их в стиралке \"освежать\" :D Короче, стирай себе на здоровье, но если что, я тут ни при чем!"},{id:33087,rating:0,date:"15.03.2026",text:"А помнится, как-то раз я подшутил и подогнал телефончик одной своей знакомой-свидетельнице Иеговы, причем особо упоротой. До сих пор ломаю голову: кто кого в итоге переплюнул?"},{id:33086,rating:0,date:"15.03.2026",text:"Врач: Так-с, выписала вам вот это вот \"что-то-от-чего-то\", \"для-того-чтобы-стало-лучше\" и, конечно, активированный уголь! Вы \"что-то-от-чего-то\" принимаете?\nЯ (на автомате): А то! Пью верой и правдой, как доктор прописал...\nВ: Это ж уколы были! 😳"},{id:33085,rating:0,date:"15.03.2026",text:"xxx: Ага, дети мебельщиков не играют в куклы, они с дерева строгают."},{id:33084,rating:0,date:"15.03.2026",text:"На официальном сайте Российской академии наук, когда речь зашла об Институте белка, англичане как-то по-доброму окрестили его \"Институтом Белки\"."},{id:33083,rating:0,date:"15.03.2026",text:"Мы, группа компаний \"Цветочный Рай\", официально подтверждаем: Светлана Соколова, в лице ее ИП \"Весенний Настроение\", получит от нас целый ворох цветов. Ну, чисто от души, без всяких там счетов и предоплат. Мы же друзья, в конце концов, а не налоговая!"},{id:33082,rating:0,date:"15.03.2026",text:"У вас там уже осенний озноб, или просто прохладно?"},{id:33081,rating:0,date:"15.03.2026",text:"Наша шефиня, она же главбух, рассказала, что в банке с нее потребовали доверенность на саму себя."},{id:33080,rating:0,date:"15.03.2026",text:"Она: А знаешь, сегодня же особенный день!\nОн: И что же за торжество такое?\nОна: Ну, Вальпургиева ночь, сам понимаешь!\nОна: Время, когда все ведьмы слетаются на свою тусовку, чтобы пообщаться с нечистой силой.\nОн: (глаза по пять копеек)\nОн: Так значит, сегодня ждать тебя дома, наверное, не стоит? :))))"},{id:33079,rating:0,date:"15.03.2026",text:"Начальник мне звонит: \"Иди в переговорку, там хоккей. Отписывайся каждые пять минут, а то я пропустить боюсь\"."},{id:33078,rating:0,date:"15.03.2026",text:"В МТУСИ, где антенны изучают, на распределительном щитке висел плакат. На нем – тот самый щиток, а рядом – Буратино, которого долбит молнией, словно предупреждая: \"Опасно, не трогай!\". И какой-то гений мысли, студент, естественно, приписал к деревянному носу: \"Дерево – не проводит ток!"},{id:33077,rating:0,date:"15.03.2026",text:"Оно: говорят, если на больную мочу пописать, она быстрее пройдет...\nдавай, чудак, сделай мне одолжение, брызни на мое сердце."},{id:33076,rating:0,date:"14.03.2026",text:"xxx: Зря я не ринулся в крипто-майнинг, когда все скупали видюхи.\nyyy: Да уже поздняк метаться, это вчерашний день.\nzzz: А что, если продавать NFT, которые сами эти видеокарты и запечатлели?\nyyy: Вот это уже философиеееееееея! Кант бы завидовал."},{id:33075,rating:0,date:"14.03.2026",text:"xxx: Чего ты в \"Вов\" не зарубаешься? Комп же специально апгрейдил, вроде.\nyyy: Да я тут закупился по полной, железо, обвесы, потом неделю всё это собирал, перед этим три месяца копался в даташитах, подбирал совместимость, изучал обзоры... Собрал – и понял, что \"Вов\" – это уже прошлый век. Теперь мой новый скилл – собирать компы на заказ, времени на игры вообще нет, да и интерес пропал.\nxxx: Красава! А я вот колечко эпическое выбил!"},{id:33074,rating:0,date:"14.03.2026",text:"xxx: Что, ММО-игры совсем скисли?\nyyy: Да уж, такая история:\nyyy: На работе тебе, конечно, нервы потреплют,\nyyy: зато потом кошелек потяжелее.\nyyy: А тут приходишь домой, уже уставший,\nyyy: думаешь, щас расслабишься,\nyyy: а тебе опять голову морочат, да еще и с энтузиазмом.\nууу: И самое главное – за это еще и деньги отдай!\nууу: В общем, развлечение для тех, кто любит, чтобы ему по жизни доставалось."},{id:33073,rating:0,date:"14.03.2026",text:"Мама перебралась в новую хату. Начала знакомиться с соседями, видимо, с тем, что под ней находится: Встает она ни свет ни заря, около пяти утра, все еще спят. Пошла в ванную, только голая встала, как вдруг из вентшахты доносится оглушительное \"АПЧХИ!\". Она, не задумываясь, и говорит: \"Будьте здоровы!\". В ответ из-под пола грохот и вопль: \"Да чтоб тебя, даже по-большому ночью спокойно не сходить!"},{id:33072,rating:0,date:"14.03.2026",text:"xxx: Пока у нас есть гомеопаты, микрозаймы и всякие \"видящие\", ясно, куда направлять госбюджет.\nxxx: Бюджет, кстати, лучше бы в мозги вкладывали."},{id:33071,rating:0,date:"14.03.2026",text:"Короче, это как с тачками. Все носятся с немецкими, японскими... типа, \"на века!\". А на деле — блок из алюмишки, в движке пластиковые потроха, поршни и шатуны — фигня на постном масле, цепь ГРМ помрёт к 50 тысячам, масла и антифриза в нём — кот наплакал, а вкладыши — будто из фольги. Теперь \"миллионник\" — это не про пробег, а про ценник."},{id:33070,rating:0,date:"14.03.2026",text:"В общем, операция – это как короткий сон, где ты укололся, моргнул, а очнулся уже в палате, будто и не было времени. А смерть, по сути, – то же самое, только вот обратно уже не проснешься."},{id:33069,rating:0,date:"14.03.2026",text:"Жена на Новый год наготовила целую гору салатов. Я, посчитав, говорю: \"Слушай, а нас же всего четверо, зачем столько?\" А она мне: \"Ну так я же не говорила, что двенадцать делать не буду!"},{id:33068,rating:0,date:"14.03.2026",text:"Нам бы с вами, знаете ли, на пару слов перекинуться, чтобы потом не пришлось пальцы гнуть. А то я тут как-то Заказчику выкатила \"Проект нехилого такого контракта\" – так он аж позеленел!"},{id:33067,rating:0,date:"14.03.2026",text:"У меня есть верная информация о питерской погоде по утрам, так что если вам нужно знать, брать ли зонт или ветровку, когда выгуливаете своих питомцев, – стучите в личку."},{id:33066,rating:0,date:"14.03.2026",text:"Подруга рассказывала. Служила она как-то в одной фирме, а там коммерческим директором – дама с характером. За первый месяц работы пересекались они с подругой раза три от силы. И вот, в очередной раз вызвав ее к себе, эта самая коммерша и выдает:\n— Слушай, мы же с тобой уже месяц на ты, получается?\n— Ну, типа того.\n— Ну так что тянем? Переходим на \"ты\" и обзываемся как хотим!\n— 😳"},{id:33065,rating:0,date:"14.03.2026",text:"Захожу в магазин, беру замороженную куриную четверть. Продавщице говорю: \"Мне, пожалуйста, только левые окорочка\". Она, пытаясь остроумно ответить: \"А чем правые-то не угодили?\" Я ей в ответ: \"Так правая у курицы – коронная! Она ею отталкивается, поэтому и жестковата\".\nМораль: тут не до шуток."},{id:33064,rating:0,date:"14.03.2026",text:"Ох, блин! У меня тут своя Санта-Барбара развернулась: пытаюсь от наших айтишников добиться хоть какой-то оценки. Кажется, вся эта эпопея закончилась полным провалом.\n\nПервый день: разжевал всё, как для младенца. Результат: \"Не можем оценить, нужны требования\".\n\nВторой день: накатал им подробнейшую спецификацию. Итог: \"Спека мутная, оценить не получится\".\n\nТретий день: к спеке ещё и эскизы приложил. Вердикт: \"Архитектура темная, как ночь, оценить не можем\".\n\nЧетвертый день: диаграммы, описания, всё как полагается. Ответ: \"План работ неясен, оценить не выйдет\".\n\nПятый день: нарисовал детальный график, сам себе оценки проставил. И отправил им: \"Разберитесь, пожалуйста, что там вообще непонятно\".\n\nВыходные прошли в терзаниях и муках предчувствия...\n\nПонедельник: \"Так, а что ты от нас вообще хочешь?\"\n\nКороче, есть желание сменить обстановку и поработать на вольных хлебах? У меня тут как раз есть пара заказов на небольшую подработку..."},{id:33063,rating:0,date:"14.03.2026",text:"Слушай, Вован, а давай замутим календарик с нашими барнаульскими панк-рокерами, но чтоб с перчинкой!\"\n\n\"Ага, понял. Виталич голый, типа, членом размахивает – это январь. А в феврале – кто-нибудь из электрички жопой наружу, под утренним ветерком."},{id:33062,rating:0,date:"14.03.2026",text:"Зашли мы с мужем в супермаркет. Я, как знаток сырных дел, зависла у витрины, внимательно разглядывая подозрительно старый кусок, пытаясь выкопать дату производства. Ну, чисто из вредности, подзываю продавщицу.\nЯ: \"Скажите, пожалуйста, сколько этому сыру уже лет?\"\nПродавщица, повертев упаковку и не найдя заветной цифры, решила пошутить: \"Ой, знаете, у сыра, как и у дамы, про возраст спрашивать не принято!\"\nМуж тут же подхватил: \"Ну да, а еще говорят, что время ему к лицу, и плесень придает особый шик!"},{id:33061,rating:0,date:"14.03.2026",text:"ххх: Всё хочу тачку с телеком встроить.\nууу: О, а у моего в \"бумере\" есть!\nххх: Офигенно. Приезжаешь за дамой, врубаешь \"Тома и Джерри\" – и пусть хоть час копается, тебе пофиг.\nууу: Кажется, я теперь знаю, зачем он моему..."},{id:33060,rating:0,date:"14.03.2026",text:"Подруга: Интересно, он меня пропустил, потому что я справа была, или потому что я — девочка?"},{id:33059,rating:0,date:"14.03.2026",text:"xxx: Никогда не перестану удивляться, почему некоторые клиенты умудряются заказывать коннекторы для витой пары именно в таком, паршивом, нечетном количестве."},{id:33058,rating:0,date:"14.03.2026",text:"deck: Слушай, а у тебя есть эта штука, которая сама раскладывает буквы по местам?\nVilent: И что это за зверь?\ndeck: Понятно, нету."},{id:33057,rating:0,date:"14.03.2026",text:"Мой научрук, пролистывая мою дипломную работу, едва не отправился в царство Морфея, а потом обозвал меня \"занудой\"."},{id:33056,rating:0,date:"13.03.2026",text:"Короче, психологи из всех космических контор, и наших, и чужих, в один голос твердят: у тех, кто в космос летал, есть такой прикол. Название у него, конечно, закачаешься, я уже и забыла, как его там величают, но суть такая: человек вдруг прозревает, как же наша Земля – крохотная, хрупкая хреновина, и мы, людишки, тоже пылинка пылинки. И тут же, на волне этого озарения, какая-то вселенская дружба народов просыпается. Неудивительно, ведь когда ты месяцами висишь над бездной, пялясь на этот обшарпанный камешек, брошенный в никуда, всякая ерунда в голову лезет гораздо сильнее. И я вот недавно призадумалась: выходит, те чувства, которые, по логике, должен испытывать любой адекватный человек на этой планете, вдруг стали считаться каким-то там \"синдромом\", а тех, кто им подвержен, смотрят как на чудиков. Хотя, по-моему, всё должно быть с точностью до наоборот."},{id:33055,rating:0,date:"13.03.2026",text:"В общем, тут битва страха с любопытством. Я-то розетки в три года не боялся, а вот в пять — уже да. Но зато в фильмоскоп лазил, пытался понять, как эта плёнка из прямоугольной в круглый объектив картинки превращается. Горячую лампочку обходил стороной, с электроплитой уже был печальный опыт, но вот в другие щели пальчики сунул. И меня так приложило, что я чуть дух не испустил (хотя, вроде, там и трансформатор был, не помню уже), сел, да так и просидел полчаса. Пришёл батя, ну и... в общем, потом ещё пару дней сидеть было проблематично. Впечатление, так сказать, закрепилось намертво."},{id:33054,rating:0,date:"13.03.2026",text:"Ждите, скоро в \"Макдоналдсе\" бургеры в рассрочку начнут продавать, я чувствую!"},{id:33053,rating:0,date:"13.03.2026",text:"Разговорились мы тут с одной дамой, и выяснилось, что её маманька её же и пилит. Причем, как оказалось, самый убойный довод в их семейных батакалиях - это когда мамаша козыряет тем, что дочь уже сама на пенсии за внуками присматривать."}]];

var SPEEDS=[0.25,0.38,0.20];

function rc(r){return r>=5000?'hi':r>=500?'md':'';}

function render(i){
  var q=DATA[i],drum=document.getElementById('d'+i),ct=document.getElementById('ct'+i);
  ct.textContent=q.length+' цитат';
  var loop=q.concat(q).concat(q);
  var html='';
  for(var j=0;j<loop.length;j++){
    var item=loop[j];
    var txt=item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html+='<div class="quote"><div class="qbody">'+txt+'</div>';
    html+='<div class="qfoot"><span class="qr '+rc(item.rating)+'">+'+item.rating.toLocaleString('ru-RU')+'</span>';
    html+='<span class="qd">'+item.date+'</span>';
    html+='<span class="qi">#'+item.id+'</span></div></div>';
  }
  drum.innerHTML=html;
  requestAnimationFrame(function(){drum.scrollTop=drum.scrollHeight/3;});
}

for(var i=0;i<3;i++){render(i);}

var pill=document.getElementById('pill');
var paused=false;

for(var i=0;i<3;i++){
  (function(idx){
    var drum=document.getElementById('d'+idx);
    var spd=SPEEDS[idx];
    var hov=false,tmr;
    function tick(){
      if(!paused&&!hov){
        drum.scrollTop+=spd;
        var t=drum.scrollHeight/3;
        if(drum.scrollTop>=t*2)drum.scrollTop-=t;
        if(drum.scrollTop<=0)drum.scrollTop+=t;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    drum.addEventListener('mouseenter',function(){hov=true;});
    drum.addEventListener('mouseleave',function(){hov=false;clearTimeout(tmr);});
    drum.addEventListener('wheel',function(){hov=true;clearTimeout(tmr);tmr=setTimeout(function(){hov=false;},1800);},{passive:true});
  })(i);
}

document.querySelectorAll('.col').forEach(function(c){
  c.addEventListener('mouseenter',function(){paused=true;pill.classList.add('on');});
  c.addEventListener('mouseleave',function(){paused=false;pill.classList.remove('on');});
});
</script>
</body>
