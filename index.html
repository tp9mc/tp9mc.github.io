<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Конструктор интерьера</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#FDFCFA;--sf1:#FFFFFF;--sf2:#F4F0EA;
  --acc:#1C1917;--acc-s:#EDE8DF;
  --tp:#1C1917;--ts:#7C7168;
  --br:#E6E0D6;--state-off:#C2BAB0;
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --vh:100dvh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--tp);
  -webkit-font-smoothing:antialiased;height:100%;
  overflow-y:auto;scroll-snap-type:y proximity;scroll-behavior:smooth;
}
body::-webkit-scrollbar{display:none}

.sec{min-height:var(--vh);scroll-snap-align:start;scroll-snap-stop:always;padding:0 18px 28px;display:flex;flex-direction:column}
.sec-head{padding-top:max(env(safe-area-inset-top,0px),32px)}
.sec-h1{font-family:var(--font-d);font-size:34px;font-weight:500;font-style:italic;line-height:1.15;letter-spacing:-.2px;margin-bottom:8px}
.sec-sub{font-size:15px;color:var(--ts);line-height:1.5;margin-bottom:26px;font-weight:400}
.cards{display:flex;flex-direction:column;gap:12px}

/* check */
.chk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--br);background:var(--sf1);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 200ms,border-color 200ms;box-shadow:0 1px 3px rgba(28,25,23,.06)}
.sel .chk{background:var(--acc);border-color:var(--acc);box-shadow:none}
.chk svg{opacity:0;transition:opacity 150ms}
.sel .chk svg{opacity:1}

/* style card */
.style-card{background:var(--sf1);border:1px solid var(--br);border-radius:24px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(28,25,23,.05),0 0 0 0 rgba(28,25,23,0);transition:transform 140ms cubic-bezier(.2,0,0,1),box-shadow 200ms,border-color 200ms}
.style-card:active{transform:scale(.975)}
.style-card.sel{border-color:var(--acc);box-shadow:0 4px 20px rgba(28,25,23,.10)}
.style-card__img{height:168px;width:100%;overflow:hidden;position:relative;background:var(--sf2)}
.style-card__img img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.style-card__row{padding:15px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.style-card__name{font-family:var(--font-d);font-size:19px;font-weight:500;margin-bottom:3px;letter-spacing:.1px}
.style-card__desc{font-size:13px;color:var(--ts);line-height:1.4;font-weight:400}

/* room card */
.room-card{background:var(--sf1);border:1px solid var(--br);border-radius:20px;overflow:hidden;cursor:pointer;display:flex;align-items:center;box-shadow:0 2px 8px rgba(28,25,23,.05);transition:transform 140ms cubic-bezier(.2,0,0,1),box-shadow 200ms,border-color 200ms}
.room-card:active{transform:scale(.975)}
.room-card.sel{border-color:var(--acc);box-shadow:0 4px 18px rgba(28,25,23,.10)}
.room-card__img{width:92px;height:84px;flex-shrink:0;overflow:hidden;position:relative;background:var(--sf2)}
.room-card__img img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.room-card__info{flex:1;padding:0 16px}
.room-card__name{font-size:17px;font-weight:500}
.room-card__cap{font-size:12px;color:var(--ts);margin-top:2px;font-weight:400}

/* kit-toggle */
.kit-card{background:var(--sf1);border:1px solid var(--br);border-radius:18px;display:flex;align-items:center;gap:12px;padding:11px 16px 11px 11px;cursor:pointer;box-shadow:0 1px 4px rgba(28,25,23,.04);transition:transform 140ms cubic-bezier(.2,0,0,1),opacity 200ms,filter 200ms}
.kit-card:active{transform:scale(.98)}
.kit-card.off{opacity:.42;filter:grayscale(.35)}
.kit-card.off .kit-toggle{background:var(--state-off)}
.kit-card__icon{width:80px;height:80px;flex-shrink:0;border-radius:12px;overflow:hidden;position:relative;background:var(--sf2)}
.kit-card__icon img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.kit-card__info{flex:1;min-width:0}
.kit-card__name{font-size:14px;font-weight:500;line-height:1.3}
.kit-toggle{width:46px;height:27px;border-radius:14px;background:var(--acc);flex-shrink:0;position:relative;transition:background 200ms}
.kit-toggle::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform 200ms cubic-bezier(.2,0,0,1);box-shadow:0 1px 4px rgba(0,0,0,.18)}
.kit-card.off .kit-toggle::after{transform:translateX(0)}
.kit-card:not(.off) .kit-toggle::after{transform:translateX(19px)}

/* setup */
#sec-setup{min-height:auto;padding:0;scroll-snap-align:start;scroll-snap-stop:always}
.cat-tabs{display:flex;gap:6px;padding:10px 16px;background:rgba(253,252,250,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:10}
.cat-tab{flex:1;padding:9px 4px;font-size:13px;font-weight:600;font-family:var(--font);text-align:center;border-radius:11px;border:1.5px solid transparent;background:transparent;color:var(--ts);cursor:pointer;transition:background 200ms,color 200ms,border-color 200ms;-webkit-appearance:none;letter-spacing:.1px}
.cat-tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.cat-pane{display:none;flex-direction:column;gap:18px;padding:20px 18px 100px}
.cat-pane.on{display:flex}
.cat-pane>div{scroll-margin-top:60px}

/* slot */
.slot-lbl{font-size:13px;font-weight:500;color:var(--ts);margin-bottom:9px;letter-spacing:.05px}
.slot-opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.opt{background:var(--sf1);border:1px solid var(--br);border-radius:20px;padding:11px 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:9px;box-shadow:0 1px 4px rgba(28,25,23,.04);transition:transform 140ms cubic-bezier(.2,0,0,1),border-color 200ms,box-shadow 200ms}
.opt:active{transform:scale(.955)}
.opt.on{border-color:var(--acc);box-shadow:0 4px 16px rgba(28,25,23,.10);transform:translateY(-2px)}
.opt__icon{width:100%;aspect-ratio:1;border-radius:13px;overflow:hidden;position:relative;background:var(--sf2)}
.opt__icon img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.opt__lbl{font-size:11px;font-weight:500;color:var(--ts);text-align:center;line-height:1.35}
.opt.on .opt__lbl{color:var(--acc)}

/* progress */
.prog-wrap{position:sticky;bottom:calc(16px + env(safe-area-inset-bottom,0px));padding:0 18px;display:flex;justify-content:flex-end;pointer-events:none;z-index:20}
.prog{background:var(--acc);color:#fff;font-size:12px;font-weight:600;font-family:var(--font);padding:8px 16px;border-radius:22px;pointer-events:auto;cursor:pointer;box-shadow:0 4px 16px rgba(28,25,23,.22);transition:background 300ms;letter-spacing:.2px}
.prog.done{background:#2A6B47}

/* cta */
#sec-cta{scroll-snap-align:start;scroll-snap-stop:always;padding:36px 18px calc(36px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:12px;min-height:220px;justify-content:center}
.cta-sum{font-family:var(--font-d);font-size:18px;font-weight:400;font-style:italic;color:var(--ts);text-align:center;min-height:24px;margin-bottom:4px;letter-spacing:.2px}
.btn-p{display:flex;align-items:center;justify-content:center;padding:18px 24px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;font-family:var(--font);letter-spacing:.2px;border-radius:18px;border:none;cursor:pointer;width:100%;box-shadow:0 4px 18px rgba(28,25,23,.16);transition:opacity 200ms,transform 120ms;-webkit-appearance:none}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
.btn-s{display:flex;align-items:center;justify-content:center;padding:16px 24px;background:transparent;color:var(--tp);font-size:15px;font-weight:500;font-family:var(--font);border-radius:18px;border:1.5px solid var(--br);cursor:pointer;width:100%;transition:background 200ms,transform 120ms;-webkit-appearance:none}
.btn-s:active{transform:scale(.97);background:var(--sf2)}

@media(max-height:600px){.sec-h1{font-size:26px}.style-card__img{height:118px}}
@media(max-width:320px){.slot-opts{gap:7px}.sec-h1{font-size:26px}}
</style>
</head>
<body>


<section class="sec" id="sec-style">
  <div class="sec-head">
    <div class="sec-h1">Выберите стиль</div>
    <div class="sec-sub">Это задаст характер всему пространству</div>
  </div>
  <div class="cards" id="style-cards"></div>
</section>

<section class="sec" id="sec-room">
  <div class="sec-head">
    <div class="sec-h1">Какую комнату<br>оформляем?</div>
    <div class="sec-sub" style="margin-bottom:20px"> </div>
  </div>
  <div class="cards" id="room-cards"></div>
</section>

<section id="sec-setup">
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab on" type="button" data-cat="furniture">Мебель</button>
    <button class="cat-tab"    type="button" data-cat="lighting">Свет</button>
    <button class="cat-tab"    type="button" data-cat="materials">Материалы</button>
  </div>
  <div class="cat-pane on" id="pane-furniture" data-cat="furniture"></div>
  <div class="cat-pane"    id="pane-lighting"  data-cat="lighting"></div>
  <div class="cat-pane"    id="pane-materials" data-cat="materials"></div>
  <div class="prog-wrap"><div class="prog" id="prog">27 / 27</div></div>
</section>

<div id="sec-cta">
  <div class="cta-sum" id="cta-sum"></div>
  <button class="btn-s" id="btn-back" type="button">↑ Изменить настройки</button>
  <button class="btn-p" id="btn-gen"  type="button">Сгенерировать ▶</button>
</div>

function stylePreviewUrl(styleId) {
  return '/assets/styles/' + STYLE_FNAME[styleId] + '.webp';
}
function roomPreviewUrl(styleId, roomId) {
  return '/assets/rooms/' + STYLE_FNAME[styleId] + '__' + roomId + '.webp';
}
function iconUrl(styleId, roomId, catId, slotId, variant) {
  if (!styleId || !roomId) return null;
  var sf = STYLE_FNAME[styleId];
  var num = slotId.split('_')[1];
  return '/assets/items/' + sf + '/' + roomId + '/' + catId + '/' + num + '__' + variant + '.webp';
}

/* ── State ── */
function defaultSetup() {
  var s = { furniture:{}, lighting:{}, materials:{} };
  CATS.forEach(function(c) { for (var i=1;i<=9;i++) s[c.id][c.px+'_'+i]=null; });
  return s;
}
var STATE_V = 2;
var S = { style:null, room:null, setup: defaultSetup() };
(function() {
  try {
    var sv = JSON.parse(sessionStorage.getItem('int_state') || 'null');
    if (sv && sv.v === STATE_V) {
      if (sv.style) S.style = sv.style;
      if (sv.room)  S.room  = sv.room;
      if (sv.setup) S.setup = sv.setup;
    }
  } catch(e) {}
})();
function save() { try { sessionStorage.setItem('int_state', JSON.stringify({v:STATE_V,style:S.style,room:S.room,setup:S.setup})); } catch(e) {} }

/* ── DOM helpers ── */
var CHK = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function imgBox(className, src) {
  var wrap = document.createElement('div');
  wrap.className = className;
  if (src) {
    var img = document.createElement('img');
    img.src = src; img.loading = 'eager'; img.decoding = 'async'; img.alt = '';
    wrap.appendChild(img);
  }
  return wrap;
}

function scrollTo(id) { document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'}); }

/* ── Render styles ── */
function renderStyles() {
  var wrap = document.getElementById('style-cards');
  wrap.innerHTML = '';
  STYLES.forEach(function(s) {
    var d = document.createElement('div');
    d.className = 'style-card' + (S.style === s.id ? ' sel' : '');
    d.appendChild(imgBox('style-card__img', stylePreviewUrl(s.id)));
    var row = document.createElement('div');
    row.className = 'style-card__row';
    row.innerHTML =
      '<div><div class="style-card__name">' + s.name + '</div>' +
      '<div class="style-card__desc">' + s.desc + '</div></div>' +
      '<div class="chk">' + CHK + '</div>';
    d.appendChild(row);
    d.addEventListener('click', function() {
      haptic('impact','medium');
      S.style = s.id; save();
      renderStyles(); renderRooms();
      setTimeout(function() { scrollTo('sec-room'); }, 250);
    });
    wrap.appendChild(d);
  });
}

/* ── Render rooms ── */
function renderRooms() {
  var wrap = document.getElementById('room-cards');
  wrap.innerHTML = '';
  ROOMS.forEach(function(r) {
    var d = document.createElement('div');
    d.className = 'room-card' + (S.room === r.id ? ' sel' : '');
    d.appendChild(imgBox('room-card__img', roomPreviewUrl(S.style || 'japandi', r.id)));
    var info = document.createElement('div');
    info.className = 'room-card__info';
    info.innerHTML = '<div class="room-card__name">' + r.name + '</div>' +
      (r.caption ? '<div class="room-card__cap">' + r.caption + '</div>' : '');
    var chk = document.createElement('div');
    chk.className = 'chk'; chk.style.marginRight = '14px'; chk.innerHTML = CHK;
    d.appendChild(info); d.appendChild(chk);
    d.addEventListener('click', function() {
      haptic('impact','medium');
      var prevRoom = S.room;
      S.room = r.id;
      if (prevRoom !== r.id) { S.setup = defaultSetup(); }
      save();
      renderRooms(); renderSetup();
      setTimeout(function() { scrollTo('sec-setup'); }, 250);
    });
    wrap.appendChild(d);
  });
}

/* ── Render setup ── */
function renderSetup() {
  CATS.forEach(function(cat) {
    var pane = document.getElementById('pane-' + cat.id);
    pane.innerHTML = '';
    var _styleLabels = ROOM_LABELS[S.style] || ROOM_LABELS.japandi;
    var roomLabels = _styleLabels[S.room] || _styleLabels.living || {};
    var labels = roomLabels[cat.id] || [];
    labels.forEach(function(lbl, idx) {
      var slotId = cat.px + '_' + (idx + 1);
      var chosen = S.setup[cat.id][slotId];
      var slotEl = document.createElement('div');
      var lblEl = document.createElement('div');
      lblEl.className = 'slot-lbl'; lblEl.textContent = lbl;
      slotEl.appendChild(lblEl);
      var optsEl = document.createElement('div');
      optsEl.className = 'slot-opts';
      ['main','alt'].forEach(function(v, vi) {
        var optCard = document.createElement('div');
        optCard.className = 'opt' + (chosen === v ? ' on' : '');
        var url = iconUrl(S.style || 'japandi', S.room || 'living', cat.id, slotId, v);
        optCard.appendChild(imgBox('opt__icon', url));
        var lbl2 = document.createElement('div');
        lbl2.className = 'opt__lbl';
        var _styleOpts = ROOM_OPTS[S.style] || ROOM_OPTS.japandi;
        var roomOpts = (_styleOpts[S.room] || _styleOpts.living || {})[cat.id];
        lbl2.textContent = (roomOpts && roomOpts[idx] || [])[vi] || (v === 'main' ? 'A' : 'Б');
        optCard.appendChild(lbl2);
        optCard.addEventListener('click', function() {
          haptic('impact','light');
          var newVal = S.setup[cat.id][slotId] === v ? null : v;
          S.setup[cat.id][slotId] = newVal; save();
          optsEl.querySelectorAll('.opt').forEach(function(c,ci){ c.classList.toggle('on', newVal !== null && ci === vi); });
          updateProg(); updateSum();
          if (newVal !== null) advanceAfterPick(slotEl, cat.id);
        });
        optsEl.appendChild(optCard);
      });
      slotEl.appendChild(optsEl);
      pane.appendChild(slotEl);
    });
  });
  updateProg(); updateSum();
}

/* ── Progress ── */
function countPicked() {
  var n = 0;
  CATS.forEach(function(c) {
    Object.values(S.setup[c.id]).forEach(function(v) { if (v) n++; });
  });
  return n;
}
function updateProg() {
  var n = countPicked();
  var el = document.getElementById('prog');
  el.textContent = n + ' / 27';
  el.className = 'prog' + (n === 27 ? ' done' : '');
}
function updateSum() {
  var el = document.getElementById('cta-sum');
  var sn = STYLES.filter(function(s){return s.id===S.style;})[0];
  var rn = ROOMS.filter(function(r){return r.id===S.room;})[0];
  el.textContent = (sn && rn) ? rn.name + ' · ' + sn.name : '';
}

/* ── Category tabs ── */
function switchCat(cat) {
  document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.toggle('on', t.dataset.cat===cat); });
  document.querySelectorAll('.cat-pane').forEach(function(p){ p.classList.toggle('on', p.dataset.cat===cat); });
}
document.getElementById('cat-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.cat-tab'); if (!btn) return;
  haptic('impact','light');
  switchCat(btn.dataset.cat);
});

/* ── Scroll after slot pick ── */
function advanceAfterPick(slotEl, catId) {
  var nextSlot = slotEl.nextElementSibling;
  var order = ['furniture', 'lighting', 'materials'];
  var ni = order.indexOf(catId) + 1;
  function doScroll(el) {
    el.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
  if (nextSlot) { doScroll(nextSlot); return; }
  if (ni < order.length) {
    switchCat(order[ni]);
    setTimeout(function() {
      var first = document.querySelector('#pane-' + order[ni] + ' > div:first-child');
      if (first) doScroll(first);
    }, 80);
  } else {
    doScroll(document.getElementById('sec-cta'));
  }
}

/* ── Progress chip: jump to first incomplete ── */
document.getElementById('prog').addEventListener('click', function() {
  for (var ci=0; ci<CATS.length; ci++) {
    var cat = CATS[ci];
    for (var i=1; i<=9; i++) {
      if (!S.setup[cat.id][cat.px+'_'+i]) {
        document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.toggle('on', t.dataset.cat===cat.id); });
        document.querySelectorAll('.cat-pane').forEach(function(p){ p.classList.toggle('on', p.dataset.cat===cat.id); });
        return;
      }
    }
  }
});

/* ── CTA ── */
document.getElementById('btn-back').addEventListener('click', function() {
  haptic('impact','light'); scrollTo('sec-style');
});

var locked = false;
document.getElementById('btn-gen').addEventListener('click', function() {
  if (locked) return;
  if (!S.style) { haptic('impact','medium'); scrollTo('sec-style'); return; }
  if (!S.room)  { haptic('impact','medium'); scrollTo('sec-room');  return; }
  locked = true;
  haptic('notify','success');
  var btn = this; btn.disabled = true; btn.textContent = '...';
  var payload = { v:2, style:S.style, room:S.room, mode:'pair_picker', setup:S.setup, ts:Math.floor(Date.now()/1000) };

  function reset() { btn.disabled=false; btn.textContent='Сгенерировать ▶'; locked=false; }

  setTimeout(function() {
    if (tg) {
      try {
        if (tg.disableClosingConfirmation) tg.disableClosingConfirmation();
        tg.sendData(JSON.stringify(payload));
        // sendData closes the app immediately on success — if we're still here, it failed silently
        setTimeout(reset, 1500);
      } catch(e) {
        reset();
        if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();
      }
    } else {
      console.log('payload:', JSON.stringify(payload, null, 2));
      alert('Демо: ' + payload.style + ' / ' + payload.room);
      reset();
    }
  }, 300);
});

/* ── Telegram BackButton ── */
if (tg && tg.BackButton) {
  document.body.addEventListener('scroll', function() {
    if (document.body.scrollTop > 80) tg.BackButton.show(); else tg.BackButton.hide();
  });
  tg.BackButton.onClick(function() {
    if (document.body.scrollTop < 100) {
      if (tg.disableClosingConfirmation) tg.disableClosingConfirmation();
      tg.close();
    } else { scrollTo('sec-style'); }
  });
}
if (tg && tg.MainButton) {
  tg.MainButton.setParams({text:'Сгенерировать', color:'#1A1A1A', text_color:'#FFFFFF'});
}

/* ── Init ── */
renderStyles();
renderRooms();
renderSetup();
</script>
</body>
</html>
