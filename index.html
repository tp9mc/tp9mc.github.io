<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Конструктор интерьера</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#FFFFFF;--sf1:#FAFAF7;--sf2:#F2EFEA;
  --acc:#1A1A1A;--acc-s:#E8E2D5;
  --tp:#1A1A1A;--ts:#6B6B6B;
  --br:#EBE8E2;--state-off:#C9C5BD;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;
  --vh:100dvh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--tp);
  -webkit-font-smoothing:antialiased;height:100%;
  overflow-y:auto;scroll-snap-type:y proximity;scroll-behavior:smooth;
}
body::-webkit-scrollbar{display:none}

.sec{min-height:var(--vh);scroll-snap-align:start;scroll-snap-stop:always;padding:0 16px 24px;display:flex;flex-direction:column}
.sec-head{padding-top:max(env(safe-area-inset-top,0px),28px)}
.sec-h1{font-size:28px;font-weight:600;line-height:1.2;letter-spacing:-.5px;margin-bottom:6px}
.sec-sub{font-size:15px;color:var(--ts);line-height:1.47;margin-bottom:24px}
.cards{display:flex;flex-direction:column;gap:10px}

/* check */
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--br);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 200ms,border-color 200ms}
.sel .chk{background:var(--acc);border-color:var(--acc)}
.chk svg{opacity:0;transition:opacity 150ms}
.sel .chk svg{opacity:1}

/* style card */
.style-card{background:var(--sf1);border:1.5px solid var(--br);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform 120ms cubic-bezier(.2,0,0,1),border-color 200ms,background 200ms}
.style-card:active{transform:scale(.97)}
.style-card.sel{border-color:var(--acc);background:var(--acc-s)}
.style-card__img{height:160px;width:100%;overflow:hidden;position:relative;background:var(--sf2)}
.style-card__img img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.style-card__row{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.style-card__name{font-size:17px;font-weight:600;margin-bottom:3px}
.style-card__desc{font-size:13px;color:var(--ts);line-height:1.38}

/* room card */
.room-card{background:var(--sf1);border:1.5px solid var(--br);border-radius:18px;overflow:hidden;cursor:pointer;display:flex;align-items:center;transition:transform 120ms cubic-bezier(.2,0,0,1),border-color 200ms,background 200ms}
.room-card:active{transform:scale(.97)}
.room-card.sel{border-color:var(--acc);background:var(--acc-s)}
.room-card__img{width:90px;height:82px;flex-shrink:0;overflow:hidden;position:relative;background:var(--sf2)}
.room-card__img img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.room-card__info{flex:1;padding:0 14px}
.room-card__name{font-size:17px;font-weight:600}
.room-card__cap{font-size:12px;color:var(--ts);margin-top:2px}

/* kit-toggle */
.kit-card{background:var(--sf1);border:1.5px solid var(--br);border-radius:16px;display:flex;align-items:center;gap:12px;padding:10px 14px 10px 10px;cursor:pointer;transition:transform 120ms cubic-bezier(.2,0,0,1),opacity 200ms,filter 200ms,border-color 200ms}
.kit-card:active{transform:scale(.98)}
.kit-card.off{opacity:.45;filter:grayscale(.4)}
.kit-card.off .kit-toggle{background:var(--state-off)}
.kit-card__icon{width:80px;height:80px;flex-shrink:0;border-radius:10px;overflow:hidden;position:relative;background:var(--sf2)}
.kit-card__icon img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.kit-card__info{flex:1;min-width:0}
.kit-card__name{font-size:14px;font-weight:600;line-height:1.3}
.kit-toggle{width:44px;height:26px;border-radius:13px;background:var(--acc);flex-shrink:0;position:relative;transition:background 200ms}
.kit-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 200ms cubic-bezier(.2,0,0,1);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.kit-card.off .kit-toggle::after{transform:translateX(0)}
.kit-card:not(.off) .kit-toggle::after{transform:translateX(18px)}

/* setup */
#sec-setup{min-height:auto;padding:0;scroll-snap-align:start;scroll-snap-stop:always}
.cat-tabs{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:10}
.cat-tab{flex:1;padding:9px 4px;font-size:13px;font-weight:600;font-family:inherit;text-align:center;border-radius:10px;border:1.5px solid transparent;background:transparent;color:var(--ts);cursor:pointer;transition:background 200ms,color 200ms;-webkit-appearance:none}
.cat-tab.on{background:var(--acc);color:#fff}
.cat-pane{display:none;flex-direction:column;gap:16px;padding:18px 16px 90px}
.cat-pane.on{display:flex}
.cat-pane>div{scroll-margin-top:58px}

/* slot */
.slot-lbl{font-size:13px;font-weight:500;color:var(--ts);margin-bottom:8px}
.slot-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.opt{background:var(--sf1);border:1.5px solid var(--br);border-radius:20px;padding:10px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform 120ms cubic-bezier(.2,0,0,1),border-color 200ms,background 200ms,box-shadow 200ms}
.opt:active{transform:scale(.96)}
.opt.on{border-color:var(--acc);background:var(--acc-s);box-shadow:0 2px 8px rgba(184,168,142,.14);transform:translateY(-2px)}
.opt__icon{width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;background:var(--sf2)}
.opt__icon img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.opt__lbl{font-size:11px;font-weight:500;color:var(--ts);text-align:center;line-height:1.3}
.opt.on .opt__lbl{color:var(--acc)}

/* progress */
.prog-wrap{position:sticky;bottom:calc(14px + env(safe-area-inset-bottom,0px));padding:0 16px;display:flex;justify-content:flex-end;pointer-events:none;z-index:20}
.prog{background:var(--acc);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;pointer-events:auto;cursor:pointer;box-shadow:0 4px 14px rgba(26,26,26,.2);transition:background 300ms}
.prog.done{background:#2D7A4F}

/* cta */
#sec-cta{scroll-snap-align:start;scroll-snap-stop:always;padding:32px 16px calc(32px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:12px;min-height:220px;justify-content:center}
.cta-sum{font-size:14px;font-weight:500;color:var(--ts);text-align:center;min-height:20px;margin-bottom:4px}
.btn-p{display:flex;align-items:center;justify-content:center;padding:17px 24px;background:var(--acc);color:#fff;font-size:17px;font-weight:600;font-family:inherit;border-radius:16px;border:none;cursor:pointer;width:100%;transition:opacity 200ms,transform 120ms;-webkit-appearance:none}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-s{display:flex;align-items:center;justify-content:center;padding:15px 24px;background:transparent;color:var(--tp);font-size:15px;font-weight:500;font-family:inherit;border-radius:16px;border:1.5px solid var(--br);cursor:pointer;width:100%;transition:background 200ms,transform 120ms;-webkit-appearance:none}
.btn-s:active{transform:scale(.97);background:var(--sf2)}

@media(max-height:600px){.sec-h1{font-size:22px}.style-card__img{height:110px}}
@media(max-width:320px){.slot-opts{gap:6px}.sec-h1{font-size:22px}}

/* edit mode */
.edit-dot.pub-ok{background:#27AE60!important;transform:scale(1.4)}
.edit-dot.pub-err{background:#E74C3C!important;transform:scale(1.4)}
.edit-dot{position:fixed;top:max(env(safe-area-inset-top,0px),10px);right:14px;width:8px;height:8px;border-radius:50%;background:#C8C3BB;z-index:200;cursor:pointer;transition:background 200ms,transform 200ms}
.edit-dot.on{background:var(--acc);transform:scale(1.6)}
body.editing [data-eid]{outline:1.5px dashed rgba(26,26,26,.22);border-radius:3px;cursor:text;min-width:8px}
body.editing [data-eid]:focus{outline:1.5px solid var(--acc);background:rgba(26,26,26,.04);border-radius:3px}
/* img edit dot */
.img-dot{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.88);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(0,0,0,.08);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 1px 5px rgba(0,0,0,.18);transition:transform 140ms}
.img-dot:active{transform:scale(.88)}
.img-dot.has-custom{background:var(--acc);color:#fff;border-color:var(--acc)}
/* img edit modal */
#img-edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#iem-sheet{background:#fff;border-radius:24px 24px 0 0;padding:14px 18px calc(28px + env(safe-area-inset-bottom,0px));width:100%;display:flex;flex-direction:column;gap:10px;max-height:84vh;overflow-y:auto}
#iem-handle{width:36px;height:4px;border-radius:2px;background:#E0DAD3;margin:0 auto 2px;flex-shrink:0}
#iem-preview{width:100%;height:130px;object-fit:cover;border-radius:14px;background:var(--sf2);flex-shrink:0}
#iem-upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;background:var(--sf1);border:1.5px dashed var(--br);border-radius:12px;font-size:14px;font-weight:500;color:var(--ts);cursor:pointer;font-family:var(--font);transition:border-color 150ms}
#iem-upload-btn:active{border-color:var(--acc)}
.iem-lbl{font-size:11px;font-weight:600;color:var(--ts);letter-spacing:.3px;text-transform:uppercase;margin-bottom:-4px}
#iem-prompt,#iem-neg{border:1.5px solid var(--br);border-radius:12px;padding:10px 12px;font-size:13px;font-family:var(--font);color:var(--tp);background:var(--sf1);resize:none;min-height:68px;line-height:1.5;outline:none;transition:border-color 150ms}
#iem-prompt:focus,#iem-neg:focus{border-color:var(--acc)}
.iem-btns{display:flex;gap:8px;margin-top:2px}
#iem-save{flex:1;background:var(--acc);color:#fff;font-size:15px;font-weight:600;font-family:var(--font);padding:15px;border-radius:14px;border:none;cursor:pointer;-webkit-appearance:none}
#iem-cancel{flex:0 0 auto;background:transparent;color:var(--ts);font-size:14px;font-weight:500;font-family:var(--font);padding:15px 18px;border-radius:14px;border:1.5px solid var(--br);cursor:pointer;-webkit-appearance:none}
#iem-reset{background:none;border:none;color:#B94040;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;padding:2px 0;text-align:left;align-self:flex-start}
#iem-gen{width:100%;padding:14px;background:#1A1A2E;color:#fff;font-size:14px;font-weight:600;font-family:var(--font);border:none;border-radius:14px;cursor:pointer;-webkit-appearance:none;transition:opacity 150ms}
#iem-gen:disabled{opacity:.45;cursor:default}
#gen-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#gen-overlay-txt{color:#fff;font-size:17px;font-weight:600;font-family:var(--font)}
#gen-overlay-sub{color:rgba(255,255,255,.6);font-size:13px;font-family:var(--font)}
.gen-spin{width:44px;height:44px;border:3px solid rgba(255,255,255,.18);border-top-color:#fff;border-radius:50%;animation:_spin .8s linear infinite}
@keyframes _spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="edit-dot" class="edit-dot"></div>

<section class="sec" id="sec-style">
  <div class="sec-head">
    <div class="sec-h1" data-eid="h-style">Стиль интерьера</div>
    <div class="sec-sub" data-eid="sub-style">Выберите эстетику, которая вам близка</div>
  </div>
  <div class="cards" id="style-cards"></div>
</section>

<section class="sec" id="sec-room">
  <div class="sec-head">
    <div class="sec-h1" data-eid="h-room">Комната</div>
    <div class="sec-sub" data-eid="sub-room">Выберите пространство для работы</div>
  </div>
  <div class="cards" id="room-cards"></div>
</section>

<section id="sec-setup">
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab on" type="button" data-cat="furniture" data-eid="tab-furniture">Мебель</button>
    <button class="cat-tab"    type="button" data-cat="lighting"  data-eid="tab-lighting">Освещение</button>
    <button class="cat-tab"    type="button" data-cat="materials" data-eid="tab-materials">Материалы</button>
  </div>
  <div class="cat-pane on" id="pane-furniture" data-cat="furniture"></div>
  <div class="cat-pane"    id="pane-lighting"  data-cat="lighting"></div>
  <div class="cat-pane"    id="pane-materials" data-cat="materials"></div>
  <div class="prog-wrap"><div class="prog" id="prog">27 / 27</div></div>
</section>

<div id="sec-cta">
  <div class="cta-sum" id="cta-sum"></div>
  <button class="btn-s" id="btn-back" type="button"><span data-eid="btn-back">Изменить выбор</span></button>
  <button class="btn-p" id="btn-gen"  type="button"><span data-eid="btn-gen">Создать интерьер</span></button>
</div>

<div id="img-edit-modal" style="display:none">
  <div id="iem-sheet">
    <div id="iem-handle"></div>
    <img id="iem-preview" alt="">
    <label id="iem-upload-btn">
      ＋ Загрузить новую картинку
      <input type="file" id="iem-file" accept="image/*" style="display:none">
    </label>
    <button id="iem-reset">Сбросить к оригиналу</button>
    <div class="iem-lbl">Промт</div>
    <textarea id="iem-prompt" placeholder="Промт для генерации..."></textarea>
    <div class="iem-lbl">Негативный промт</div>
    <textarea id="iem-neg" placeholder="Что исключить из картинки..."></textarea>
    <button id="iem-gen">⚡ Сгенерировать по промту</button>
    <div class="iem-btns">
      <button id="iem-cancel">Отмена</button>
      <button id="iem-save">Сохранить</button>
    </div>
  </div>
</div>

<div id="gen-overlay">
  <div class="gen-spin"></div>
  <div id="gen-overlay-txt">Генерирую...</div>
  <div id="gen-overlay-sub">FLUX.1-schnell · ~10–20 с</div>
</div>

<script>
/* ── Proxy URL and publish token from URL params (set by bot) ── */
(function() {
  try {
    var params = new URLSearchParams(window.location.search);
    var p = params.get('proxy');
    if (p) localStorage.setItem('gen_proxy_url', p.replace(/\/$/, ''));
    var t = params.get('t');
    if (t) localStorage.setItem('gh_pub_token', t);
    var u = params.get('u');
    if (u) localStorage.setItem('gh_pub_user', u);
  } catch(e) {}
})();

/* ── Load published site edits (visible to all users) ── */
fetch('site_edits.json?_=' + Date.now())
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(d) {
    if (!d) return;
    if (d.edits) Object.keys(d.edits).forEach(function(k) {
      if (!(k in EDITS)) EDITS[k] = d.edits[k];
    });
    if (d.imgs) Object.keys(d.imgs).forEach(function(k) {
      if (!(k in IMG_STORE)) IMG_STORE[k] = d.imgs[k];
    });
    try { localStorage.setItem('ie_edits', JSON.stringify(EDITS)); } catch(e) {}
    saveImgStore();
    renderStyles(); renderRooms(); renderSetup();
  })
  .catch(function() {});

/* ── Telegram ── */
var tg = (window.Telegram || {}).WebApp || null;

if (tg) {
  tg.ready(); tg.expand();
  if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
  tg.setHeaderColor('#FFFFFF'); tg.setBackgroundColor('#FFFFFF');
  if (tg.setBottomBarColor) tg.setBottomBarColor('#FFFFFF');
  tg.enableClosingConfirmation();
  function setVH() { document.documentElement.style.setProperty('--vh', (tg.viewportStableHeight || window.innerHeight) + 'px'); }
  setVH();
  tg.onEvent('viewportChanged', setVH);
}
function haptic(t, s) {
  if (!tg || !tg.HapticFeedback) return;
  if (t === 'impact') tg.HapticFeedback.impactOccurred(s || 'light');
  if (t === 'notify') tg.HapticFeedback.notificationOccurred(s || 'success');
}

/* ── Data ── */
var STYLES = [
  { id:'japandi',        name:'Japandi',           desc:'Тёплое дерево, лён, низкие силуэты' },
  { id:'modern_classic', name:'Modern Classic',    desc:'Мрамор, бархат, симметрия и латунь' },
  { id:'scandi',         name:'Scandi-минимализм', desc:'Светлое дерево, мягкий текстиль, тихая палитра' },
];
var ROOMS = [
  { id:'living',   name:'Гостиная' },
  { id:'bedroom',  name:'Спальня' },
  { id:'kitchen',  name:'Кухня' },
  { id:'bathroom', name:'Ванная' },
];
var CATS = [
  { id:'furniture', px:'f' },
  { id:'lighting',  px:'l' },
  { id:'materials', px:'m' },
];
var ROOM_LABELS = {
  japandi: {
    living: {
      furniture: ['Низкий модульный диван','Журнальный стол','Кресло с плетением','Низкая консоль под ТВ','Деревянная реечная','Встроенные шкафы','Табурет из бамбука','Напольные подушки','Отдельно стоящий'],
      lighting: ['Светильник из рисовой','Низкий торшер','Скрытая LED-подсветка','Настольная лампа','Настенное бра','Плетеный абажур','Потолочные споты','Переносной','Подсветка'],
      materials: ['Стены: Теплые бежевые','Пол: Светлый дуб','Стены: Реечные','Текстиль: Натуральный','Камень : Природный','Детали: Бамбук','Керамика: Ваби-саби','Ковер: Джут или сизаль','Шторы: Рулонные'],
    },
    bedroom: {
      furniture: ['Низкая кровать-подиум','Подвесные консольные','Шкаф','Деревянная банкетка','Низкий туалетный','Акцентное кресло','Напольное зеркало','Прикроватная вешалка','Встроенные незаметные'],
      lighting: ['Бумажный','Бамбуковые','Бра для чтения','LED-подсветка','Торшер для зоны чтения','Безрамочные','Внутренняя','Навигационная','Диммируемый теплый'],
      materials: ['Стены : Известковая','Пол: Деревянный','Мебель : Деревянное','Текстиль: Постельное','Ковер: Джут возле','Шторы: Оконные экраны','Декор: Глиняный','Фурнитура: Каменная','Детали: Черные'],
    },
    bathroom: {
      furniture: ['Подвесная тумба','Деревянная скамья','Высокий узкий','Минималистичная','Раковина из цельного','Деревянная','Зеркало без рамы','Встроенная деревянная','Скрытое хранение'],
      lighting: ['Фоновая подсветка','Подвес над раковиной','Влагозащищенная','Встроенные потолочные','LED-подсветка','Теплый диммируемый','Керамическое','Отраженный','Подвесной светильник'],
      materials: ['Стены: Влагостойкая','Потолок: Светлый','Пол : Микроцемент','Душевая зона: Галька','Сантехника : Матовая','Текстиль: Вафельные','Акценты : Травертин','Декор : Бамбуковый','Перегородки : Матовое'],
    },
    kitchen: {
      furniture: ['Кухонный остров','Барный стул','Низкий обеденный стол','Открытая навесная','Высокий шкаф-пенал','Деревянная тележка','Керамическая мойка','Кухонный смеситель','Разделочная доска'],
      lighting: ['Подвес над островом','Бра рабочей зоны','LED-профиль','Потолочный спот','Трековый светильник','Настольная лампа','Встроенный','Умный выключатель','Подсветка цоколя'],
      materials: ['Фартук : Рельефная','Столешница : Травертин','Фасад кухни : Шпон','Текстиль : Грубое','Посуда : Керамическая','Декор : Бамбуковая','Фурнитура : Скрытая','Пол : Микроцемент','Окно : Рулонная штора'],
    },
  },
  modern_classic: {

  return '/assets/rooms/' + STYLE_FNAME[styleId] + '__' + roomId + '.webp';

  var s = { furniture:{}, lighting:{}, materials:{} };

/* ── Render setup ── */
function renderSetup() {
  CATS.forEach(function(cat) {
    var pane = document.getElementById('pane-' + cat.id);
    pane.innerHTML = '';
    var _styleLabels = ROOM_LABELS[S.style] || ROOM_LABELS.japandi;
    var roomLabels = _styleLabels[S.room] || _styleLabels.living || {};
    var labels = roomLabels[cat.id] || [];
    labels.forEach(function(lbl, idx) {
      var slotId = cat.px + '_' + (idx + 1);
      var chosen = S.setup[cat.id][slotId];
      var slotEl = document.createElement('div');
      var lblEl = document.createElement('div');
      lblEl.className = 'slot-lbl'; lblEl.textContent = lbl;
      lblEl.dataset.eid = 'lbl-' + (S.style||'j') + '-' + (S.room||'l') + '-' + cat.id + '-' + idx;
      slotEl.appendChild(lblEl);
      var optsEl = document.createElement('div');
      optsEl.className = 'slot-opts';
      ['main','alt','alt2'].forEach(function(v, vi) {
        var optCard = document.createElement('div');
        optCard.className = 'opt' + (chosen === v ? ' on' : '');
        var url = iconUrl(S.style || 'japandi', S.room || 'living', cat.id, slotId, v);
        var _oi = imgBox('opt__icon', url);
        _oi.dataset.imgEid = 'opt-' + (S.style||'japandi') + '-' + (S.room||'living') + '-' + cat.id + '-' + idx + '-' + v;
        optCard.appendChild(_oi);
        var lbl2 = document.createElement('div');
        lbl2.className = 'opt__lbl';
        var _styleOpts = ROOM_OPTS[S.style] || ROOM_OPTS.japandi;
        var roomOpts = (_styleOpts[S.room] || _styleOpts.living || {})[cat.id];
        var _defLbl = {main:'A', alt:'Б', alt2:'В'};
        lbl2.textContent = (roomOpts && roomOpts[idx] || [])[vi] || _defLbl[v] || '·';
        lbl2.dataset.eid = 'opt-' + (S.style||'j') + '-' + (S.room||'l') + '-' + cat.id + '-' + idx + '-' + v;
        optCard.appendChild(lbl2);
        optCard.addEventListener('click', function() {
          haptic('impact','light');
          var newVal = S.setup[cat.id][slotId] === v ? null : v;
          S.setup[cat.id][slotId] = newVal; save();
          optsEl.querySelectorAll('.opt').forEach(function(c,ci){ c.classList.toggle('on', newVal !== null && ci === vi); });
          updateProg(); updateSum();
          if (newVal !== null) advanceAfterPick(slotEl, cat.id);
        });
        optsEl.appendChild(optCard);
      });
      slotEl.appendChild(optsEl);
      pane.appendChild(slotEl);
    });
  });
  updateProg(); updateSum();
  applyEdits();
}

/* ── Scroll after slot pick ── */
function advanceAfterPick(slotEl, catId) {
  var nextSlot = slotEl.nextElementSibling;
  var order = ['furniture', 'lighting', 'materials'];
  var ni = order.indexOf(catId) + 1;
  function doScroll(el) {
    el.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
  if (nextSlot) { doScroll(nextSlot); return; }
  if (ni < order.length) {
    switchCat(order[ni]);
    setTimeout(function() {
      var first = document.querySelector('#pane-' + order[ni] + ' > div:first-child');
      if (first) doScroll(first);
    }, 80);
  } else {
    doScroll(document.getElementById('sec-cta'));
  }
}

var EDITOR_IDS = [184667104, 356003432];
(function() {

  var user = tgWA && tgWA.initDataUnsafe && tgWA.initDataUnsafe.user;

var _editSnapshot = '';

function _publishToGitHub(edits, imgs, changes, tgUser) {
  var GH_TOKEN = localStorage.getItem('gh_pub_token') || '';
  var API = 'https://api.github.com/repos/tp9mc/tp9mc.github.io/contents/site_edits.json';
  var hdrs = {'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  return fetch(API, {headers: hdrs})
    .then(function(r) { return r.json(); })
    .then(function(cur) {
      var existing = {};
      try { existing = JSON.parse(decodeURIComponent(escape(atob(cur.content.replace(/\n/g,''))))); } catch(e) {}
      var hasImg = changes.some(function(c) { return c.type==='upload'||c.type==='gen'; });
      var mergedImgs = Object.assign({}, existing.imgs || {});
      if (hasImg) {
        Object.keys(imgs).forEach(function(eid) {
          var it = imgs[eid];
          if (it && it.url && it.url.indexOf('data:') !== 0) mergedImgs[eid] = it;
        });
      }
      var body = JSON.stringify({edits: edits, imgs: mergedImgs}, null, 2);
      var author = (tgUser && (tgUser.username || tgUser.first_name))
                  || localStorage.getItem('gh_pub_user') || 'editor';
      return fetch(API, {
        method: 'PUT', headers: hdrs,
        body: JSON.stringify({
          message: 'site: publish by @' + author,
          content: btoa(unescape(encodeURIComponent(body))),
          sha: cur.sha
        })
      });
    })
    .then(function(r) { if (!r.ok) throw new Error(r.status); });
}

document.getElementById('edit-dot').addEventListener('click', function() {
  var dot = this;
  _editOn = !_editOn;
  dot.classList.toggle('on', _editOn);
  document.body.classList.toggle('editing', _editOn);

  if (_editOn) {
    document.addEventListener('touchmove', _scrollLock, {passive: false});
    _editSnapshot = JSON.stringify({e: EDITS, i: IMG_STORE});
    _loadPrompts(function() { _attachEditable(); _attachImgDots(); });
  } else {
    document.removeEventListener('touchmove', _scrollLock, {passive: false});
    _detachEditable(); _detachImgDots();
    var changed = JSON.stringify({e: EDITS, i: IMG_STORE}) !== _editSnapshot;
    if (!changed) return;
    var snap = JSON.parse(_editSnapshot);
    var snapE = snap.e || {}, snapI = snap.i || {};
    var changes = [];
    Object.keys(EDITS).forEach(function(eid) {
      if (EDITS[eid] !== snapE[eid])
        changes.push({type: 'text', eid: eid, value: EDITS[eid]});
    });
    Object.keys(IMG_STORE).forEach(function(eid) {
      var cur = IMG_STORE[eid], prev = snapI[eid] || {};
      if (cur.url && cur.url !== prev.url)
        changes.push({type: cur.source === 'generated' ? 'gen' : 'upload', eid: eid});
      if (cur.prompt && cur.prompt !== prev.prompt)
        changes.push({type: 'prompt', eid: eid, value: cur.prompt});
    });
    var tg = window.Telegram && window.Telegram.WebApp;
    var tgUser = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user || null : null;
    dot.style.pointerEvents = 'none'; dot.style.opacity = '0.4';
    _publishToGitHub(EDITS, IMG_STORE, changes, tgUser).then(function() {
      dot.style.pointerEvents = ''; dot.style.opacity = '';
      dot.classList.add('pub-ok');
      setTimeout(function() { dot.classList.remove('pub-ok'); }, 2000);
      // stats ping to bot — fire-and-forget, ok if unreachable
      try { fetch(_getProxyUrl()+'/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({edits:{},imgs:{},changes:changes,user:tgUser,stats_only:true})}).catch(function(){}); } catch(e) {}
    }).catch(function() {
      dot.style.pointerEvents = ''; dot.style.opacity = '';
      dot.classList.add('pub-err');
      setTimeout(function() { dot.classList.remove('pub-err'); }, 2000);
    });
  }
});

document.getElementById('iem-save').addEventListener('click', function() {

  var entry = IMG_STORE[eid] || {};

  var p = document.getElementById('iem-prompt').value.trim();
  var n = document.getElementById('iem-neg').value.trim();
  if (p) entry.prompt = p; else delete entry.prompt;
  if (n) entry.neg    = n; else delete entry.neg;
  if (Object.keys(entry).length) IMG_STORE[eid] = entry;
  else delete IMG_STORE[eid];

  if (_iemPending) {
    var img = _iemTarget.querySelector('img');

    img.src = _iemPending;

var HF_HOUR_LIMIT = 100;

function _hfCheckLimit() {
  var now = Date.now();
  var hour = 60 * 60 * 1000;
  var ts = [];
  try { ts = JSON.parse(localStorage.getItem('hf_gen_ts') || '[]'); } catch(e) {}
  ts = ts.filter(function(t) { return now - t < hour; });
  if (ts.length >= HF_HOUR_LIMIT) {
    var oldestExpiry = Math.ceil((hour - (now - ts[0])) / 60000);
    alert('Лимит ' + HF_HOUR_LIMIT + ' HF-генераций/час достигнут.\nСледующая доступна через ~' + oldestExpiry + ' мин.');
    return false;
  }
  ts.push(now);
  try { localStorage.setItem('hf_gen_ts', JSON.stringify(ts)); } catch(e) {}
  return true;
}

document.getElementById('iem-gen').addEventListener('click', function() {
  var prompt = document.getElementById('iem-prompt').value.trim();
  if (!prompt) { alert('Укажите промт для генерации'); return; }
  if (!_hfCheckLimit()) return;

  var eid = _iemTarget && _iemTarget.dataset.imgEid || '';
  var isOpt = eid.startsWith('opt-');
  var w = isOpt ? 1024 : 1344, h = isOpt ? 1024 : 768;

  var overlay = document.getElementById('gen-overlay');
  var overSub = document.getElementById('gen-overlay-sub');
  overlay.style.display = 'flex';
  document.getElementById('img-edit-modal').style.display = 'none';

  var t0 = Date.now();
  var timer = setInterval(function() {
    var s = Math.round((Date.now() - t0) / 1000);
    overSub.textContent = 'FLUX.1-schnell · ' + s + ' с';
  }, 1000);

  function _doFetch(url) {
    return fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt, width: w, height: h})
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || ('HTTP ' + r.status)); });
      return r.blob();
    });
  }

  _doFetch(_getProxyUrl()).catch(function(err) {
    if (_getProxyUrl() === GEN_PROXY_DEFAULT) {
      throw new Error('Бот недоступен. Открой Mini App по кнопке из сообщения бота — URL прокси сохранится автоматически.');
    }
    throw err;
  }).then(function(blob) {
    var reader = new FileReader();
    reader.onload = function(e) {
      clearInterval(timer);
      var dataUrl = e.target.result;
      if (_iemTarget) {
        var saveEid = _iemTarget.dataset.imgEid;
        var entry = IMG_STORE[saveEid] || {};
        entry.url = dataUrl; entry.source = 'generated';
        var p = document.getElementById('iem-prompt').value.trim();
        var n = document.getElementById('iem-neg').value.trim();
        if (p) entry.prompt = p; else delete entry.prompt;
        if (n) entry.neg = n; else delete entry.neg;
        IMG_STORE[saveEid] = entry;
        saveImgStore();
        applyImgEdits();
        _iemPending = dataUrl;
        document.getElementById('iem-preview').src = dataUrl;
      }
      overlay.style.display = 'none';
      document.getElementById('img-edit-modal').style.display = 'flex';
    };
    reader.readAsDataURL(blob);
  }).catch(function(err) {
    clearInterval(timer);
    overlay.style.display = 'none';
    document.getElementById('img-edit-modal').style.display = 'flex';
    alert('Ошибка генерации: ' + err.message);
  });
});

/* ── Init ── */
renderStyles();
renderRooms();
renderSetup();
</script>
</body>
</html>
