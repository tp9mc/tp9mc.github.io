<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Башорг</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fg: #1d1d1f;
      --fg-muted: #6e6e73;
      --fg-faint: #aeaeb2;
      --border: #e8e8ed;
      --bg: #ffffff;
      --bg-hover: #f5f5f7;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding: 26px 40px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.022em;
      color: var(--fg);
    }

    .header-sub {
      font-size: 12px;
      color: var(--fg-muted);
      letter-spacing: 0.01em;
    }

    .header-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--fg-faint);
      flex-shrink: 0;
      align-self: center;
    }

    /* ── Columns ── */
    .stage {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .col {
      position: relative;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .col:last-child { border-right: none; }

    /* ── Year label ── */
    .col-year {
      padding: 14px 28px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .col-year-num {
      color: var(--fg);
    }

    .col-count {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--fg-faint);
    }

    /* ── Scroll drum ── */
    .drum {
      flex: 1;
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .drum::-webkit-scrollbar { display: none; }

    /* ── Quote card ── */
    .quote {
      padding: 18px 28px 16px;
      border-bottom: 1px solid #f2f2f7;
      cursor: default;
      transition: background 0.15s ease;
    }
    .quote:hover { background: var(--bg-hover); }

    .quote-body {
      font-size: 13px;
      line-height: 1.7;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .quote-nick {
      color: var(--fg-muted);
      font-weight: 500;
    }

    .quote-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .quote-rating {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg-faint);
      letter-spacing: 0.02em;
    }

    .quote-rating.high { color: #30d158; }
    .quote-rating.mid  { color: var(--fg-faint); }

    .quote-id {
      font-size: 10px;
      color: #c7c7cc;
    }

    /* ── Gradient fades (drum illusion) ── */
    .col::before, .col::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      pointer-events: none;
      z-index: 4;
    }
    .col::before {
      top: 40px; /* below year label */
      height: 64px;
      background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
    }
    .col::after {
      bottom: 0;
      height: 80px;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
    }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      padding: 12px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-text {
      font-size: 11px;
      color: #c7c7cc;
    }
    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #d1d1d6;
    }
    .footer-link {
      font-size: 11px;
      color: #aeaeb2;
      text-decoration: none;
    }
    .footer-link:hover { color: var(--fg-muted); }

    /* ── Pause badge ── */
    .paused-badge {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
      letter-spacing: 0.03em;
    }
    .paused-badge.visible { opacity: 1; }

    /* ── Loading state ── */
    .loading {
      padding: 28px;
      font-size: 12px;
      color: var(--fg-faint);
      text-align: center;
    }
  </style>
</head>

// ── HTML parser for quotes ──
function parseQuotes(html) {
  const quotes = [];
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const items = doc.querySelectorAll('.quote__body, .quote, article.quote');
  items.forEach(item => {
    const textEl = item.querySelector('.quote__body, .quote-text, .text');
    const ratingEl = item.querySelector('.quote__rating, .rating, .vote_sum');
    const idEl = item.querySelector('.quote__header a, .quote__id, a[href*="/quote/"]');
    if (!textEl) return;
    const text = textEl.innerText || textEl.textContent || '';
    const rating = parseInt((ratingEl?.textContent || '0').replace(/\D/g,'')) || 0;
    const idMatch = (idEl?.href || idEl?.textContent || '').match(/(\d+)/);
    const id = idMatch ? parseInt(idMatch[1]) : Math.random() * 1e6 | 0;
    if (text.trim().length > 10) quotes.push({ id, rating, text: text.trim() });
  });
  return quotes;
}

// ── Fetch via CORS proxy ──
async function fetchYear(year) {
  const url = `https://bash.im/year/${year}`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  try {
    const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('not ok');
    const html = await res.text();
    const quotes = parseQuotes(html);
    if (quotes.length > 0) return quotes;
  } catch {}
  return null;
}

// ── Render quotes ──
function renderRating(r) {
  const cls = r >= 1500 ? 'high' : 'mid';
  return `<span class="quote-rating ${cls}">+${r.toLocaleString('ru-RU')}</span>`;
}

function renderQuotes(quotes, drumEl, year, countEl) {
  if (!quotes || quotes.length === 0) quotes = FALLBACK[year] || [];
  countEl.textContent = `${quotes.length} цитат`;

  // Duplicate for infinite loop (3x)
  const looped = [...quotes, ...quotes, ...quotes];
  drumEl.innerHTML = looped.map(q => {
    const body = q.text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/&lt;nick&gt;([^<]+)&lt;\/nick&gt;/g, '<span class="quote-nick">$1</span>');
    return `<div class="quote">
      <div class="quote-body">${body}</div>
      <div class="quote-footer">
        ${renderRating(q.rating)}
        <span class="quote-id">#${q.id}</span>
      </div>
    </div>`;
  }).join('');

  // Start scroll from middle copy
  requestAnimationFrame(() => {
    const totalH = drumEl.scrollHeight;
    drumEl.scrollTop = totalH / 3;
  });
}

// ── Auto-scroll engine ──
const SPEEDS = { 2022: 0.28, 2023: 0.38, 2024: 0.22 }; // px/frame
const paused = { 2022: false, 2023: false, 2024: false };
let globalPause = false;

function initScroll(year) {
  const drum = document.getElementById(`drum-${year}`);
  if (!drum) return;

  let speed = SPEEDS[year];
  let rafId;
  let hovered = false;

  function tick() {
    if (!globalPause && !hovered) {
      drum.scrollTop += speed;

      // Seamless loop: when past 2/3 → jump to 1/3
      const third = drum.scrollHeight / 3;
      if (drum.scrollTop >= third * 2) {
        drum.scrollTop -= third;
      }
      if (drum.scrollTop <= 0) {
        drum.scrollTop += third;
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  drum.addEventListener('mouseenter', () => { hovered = true; });
  drum.addEventListener('mouseleave', () => { hovered = false; });

  // Manual scroll: pause auto for 2s after user scrolls
  let scrollTimer;
  drum.addEventListener('wheel', () => {
    hovered = true;
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => { hovered = false; }, 2000);
  }, { passive: true });

  rafId = requestAnimationFrame(tick);
}

// ── Global pause on any hover ──
const badge = document.getElementById('pausedBadge');
document.querySelectorAll('.col').forEach(col => {
  col.addEventListener('mouseenter', () => {
    globalPause = true;
    badge.classList.add('visible');
  });
  col.addEventListener('mouseleave', () => {
    globalPause = false;
    badge.classList.remove('visible');
  });
});

// ── Bootstrap ──
const years = [2022, 2023, 2024];

years.forEach(year => {
  const drum = document.getElementById(`drum-${year}`);
  const cnt  = document.getElementById(`cnt-${year}`);
  // Show fallback immediately
  renderQuotes(FALLBACK[year], drum, year, cnt);
  initScroll(year);
  // Try to fetch real data
  fetchYear(year).then(quotes => {
    if (quotes && quotes.length > 0) {
      renderQuotes(quotes, drum, year, cnt);
    }
  });
});
