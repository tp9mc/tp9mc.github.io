<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Конструктор интерьера</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#FFFFFF;--sf1:#FAFAF7;--sf2:#F2EFEA;
  --acc:#1A1A1A;--acc-s:#E8E2D5;
  --tp:#1A1A1A;--ts:#6B6B6B;
  --br:#EBE8E2;--sh:rgba(26,26,26,0.06);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;
  --vh:100dvh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--tp);
  -webkit-font-smoothing:antialiased;
  height:100%;overflow-y:auto;
  scroll-snap-type:y mandatory;scroll-behavior:smooth;
}
body::-webkit-scrollbar{display:none}

/* ── Sections ── */
.sec{
  min-height:var(--vh);scroll-snap-align:start;scroll-snap-stop:always;
  padding:0 16px 24px;display:flex;flex-direction:column;
}
.sec-head{padding-top:max(env(safe-area-inset-top,0px),28px)}
.sec-h1{font-size:28px;font-weight:600;line-height:1.2;letter-spacing:-.5px;margin-bottom:6px}
.sec-sub{font-size:15px;color:var(--ts);line-height:1.47;margin-bottom:24px}
.cards{display:flex;flex-direction:column;gap:10px}

/* ── Check mark ── */
.chk{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--br);background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background 200ms,border-color 200ms;
}
.sel .chk{background:var(--acc);border-color:var(--acc)}
.chk svg{opacity:0;transition:opacity 150ms}
.sel .chk svg{opacity:1}

/* ── Style card ── */
.style-card{
  background:var(--sf1);border:1.5px solid var(--br);border-radius:20px;
  overflow:hidden;cursor:pointer;
  transition:transform 120ms cubic-bezier(.2,0,0,1),border-color 200ms,background 200ms;
}
.style-card:active{transform:scale(.97)}
.style-card.sel{border-color:var(--acc);background:var(--acc-s)}
.style-card__img{height:156px;width:100%}
.style-card__row{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.style-card__name{font-size:17px;font-weight:600;margin-bottom:3px}
.style-card__desc{font-size:13px;color:var(--ts);line-height:1.38}

/* ── Room card ── */
.room-card{
  background:var(--sf1);border:1.5px solid var(--br);border-radius:18px;
  overflow:hidden;cursor:pointer;display:flex;align-items:center;
  transition:transform 120ms cubic-bezier(.2,0,0,1),border-color 200ms,background 200ms;
}
.room-card:active{transform:scale(.97)}
.room-card.sel{border-color:var(--acc);background:var(--acc-s)}
.room-card__img{width:86px;height:78px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px}
.room-card__name{flex:1;font-size:17px;font-weight:600;padding:0 14px}

/* ── Setup section ── */
#sec-setup{min-height:auto;padding:0;scroll-snap-align:start;scroll-snap-stop:always}
.cat-tabs{
  display:flex;gap:6px;padding:10px 14px;
  background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--br);position:sticky;top:0;z-index:10;
}
.cat-tab{
  flex:1;padding:9px 4px;font-size:13px;font-weight:600;font-family:inherit;
  text-align:center;border-radius:10px;border:1.5px solid transparent;
  background:transparent;color:var(--ts);cursor:pointer;
  transition:background 200ms,color 200ms;-webkit-appearance:none;
}
.cat-tab.on{background:var(--acc);color:#fff}

.cat-pane{display:none;flex-direction:column;gap:16px;padding:18px 16px 90px}
.cat-pane.on{display:flex}

/* ── Slot pair ── */
.slot-lbl{font-size:13px;font-weight:500;color:var(--ts);margin-bottom:8px}
.slot-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{
  background:var(--sf1);border:1.5px solid var(--br);border-radius:20px;
  padding:10px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:transform 120ms cubic-bezier(.2,0,0,1),border-color 200ms,background 200ms,box-shadow 200ms;
}
.opt:active{transform:scale(.96)}
.opt.on{
  border-color:var(--acc);background:var(--acc-s);
  box-shadow:0 2px 8px rgba(184,168,142,.14);transform:translateY(-2px);
}
.opt__icon{width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--sf2)}
.opt__icon img{width:100%;height:100%;object-fit:cover;display:block}
.opt__lbl{font-size:11px;font-weight:500;color:var(--ts);text-align:center;line-height:1.3}
.opt.on .opt__lbl{color:var(--acc)}

/* ── Progress chip ── */
.prog-wrap{
  position:sticky;bottom:calc(14px + env(safe-area-inset-bottom,0px));
  padding:0 16px;display:flex;justify-content:flex-end;
  pointer-events:none;z-index:20;
}
.prog{
  background:var(--acc);color:#fff;font-size:12px;font-weight:600;
  padding:7px 14px;border-radius:20px;pointer-events:auto;cursor:pointer;
  box-shadow:0 4px 14px rgba(26,26,26,.2);transition:background 300ms;
}
.prog.done{background:#2D7A4F}

/* ── CTA zone ── */
#sec-cta{
  scroll-snap-align:start;scroll-snap-stop:always;
  padding:32px 16px calc(32px + env(safe-area-inset-bottom,0px));
  display:flex;flex-direction:column;gap:12px;
  min-height:220px;justify-content:center;
}
.cta-sum{font-size:14px;font-weight:500;color:var(--ts);text-align:center;min-height:20px;margin-bottom:4px}
.btn-p{
  display:flex;align-items:center;justify-content:center;
  padding:17px 24px;background:var(--acc);color:#fff;
  font-size:17px;font-weight:600;font-family:inherit;
  border-radius:16px;border:none;cursor:pointer;width:100%;
  transition:opacity 200ms,transform 120ms;-webkit-appearance:none;
}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-s{
  display:flex;align-items:center;justify-content:center;
  padding:15px 24px;background:transparent;color:var(--tp);
  font-size:15px;font-weight:500;font-family:inherit;
  border-radius:16px;border:1.5px solid var(--br);cursor:pointer;width:100%;
  transition:background 200ms,transform 120ms;-webkit-appearance:none;
}
.btn-s:active{transform:scale(.97);background:var(--sf2)}

/* ── Placeholder preview gradients ── */
.prev-japandi{background:linear-gradient(135deg,#C9B89A,#E8DBC8,#D4C4A8)}
.prev-modern_classic{background:linear-gradient(135deg,#D4CFC8,#EDEAE4,#C8C3BC)}
.prev-scandi{background:linear-gradient(135deg,#E0D5C5,#F3F0E8,#D6CAB6)}
.prev-living{background:linear-gradient(135deg,#DDD5C4,#F5F0E4)}
.prev-bedroom{background:linear-gradient(135deg,#D5D0C8,#EDEAE3)}
.prev-bathroom{background:linear-gradient(135deg,#C8D4D4,#E3EAEA)}
.ic-f-main{background:linear-gradient(135deg,#D8CAB2,#C4B49E)}
.ic-f-alt{background:linear-gradient(135deg,#B8AA92,#A8987C)}
.ic-l-main{background:linear-gradient(135deg,#E4D8A4,#D4C890)}
.ic-l-alt{background:linear-gradient(135deg,#CCBE88,#BCB078)}
.ic-m-main{background:linear-gradient(135deg,#C4D4C0,#B0C4AC)}
.ic-m-alt{background:linear-gradient(135deg,#A8B8A4,#98A890)}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{
  background:linear-gradient(90deg,var(--sf2) 25%,var(--sf1) 50%,var(--sf2) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
}

@media(max-height:600px){.sec-h1{font-size:22px}.style-card__img{height:110px}}
@media(max-width:320px){.slot-opts{gap:6px}.sec-h1{font-size:22px}}
</style>
</head>
<body>

<!-- §1 Выбор стиля -->
<section class="sec" id="sec-style">
  <div class="sec-head">
    <div class="sec-h1">Выберите стиль</div>
    <div class="sec-sub">Это задаст характер всему пространству</div>
  </div>
  <div class="cards" id="style-cards"></div>
</section>

<!-- §2 Выбор комнаты -->
<section class="sec" id="sec-room">
  <div class="sec-head">
    <div class="sec-h1">Какую комнату<br>оформляем?</div>
    <div class="sec-sub" style="margin-bottom:20px"> </div>
  </div>
  <div class="cards" id="room-cards"></div>
</section>

<!-- §3 Настройка -->
<section id="sec-setup">
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab on" type="button" data-cat="furniture">Мебель</button>
    <button class="cat-tab"    type="button" data-cat="lighting">Свет</button>
    <button class="cat-tab"    type="button" data-cat="materials">Материалы</button>
  </div>
  <div class="cat-pane on" id="pane-furniture" data-cat="furniture"></div>
  <div class="cat-pane"    id="pane-lighting"  data-cat="lighting"></div>
  <div class="cat-pane"    id="pane-materials" data-cat="materials"></div>
  <div class="prog-wrap"><div class="prog" id="prog">0 / 27</div></div>
</section>

<!-- Развилка -->
<div id="sec-cta">
  <div class="cta-sum" id="cta-sum"></div>
  <button class="btn-s" id="btn-back" type="button">↑ Изменить настройки</button>
  <button class="btn-p" id="btn-gen"  type="button">Сгенерировать ▶</button>
</div>

<script>
/* ── Telegram init ── */
var tg = (window.Telegram || {}).WebApp || null;
if (tg) {
  tg.ready(); tg.expand();
  if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
  tg.setHeaderColor('#FFFFFF'); tg.setBackgroundColor('#FFFFFF');
  if (tg.setBottomBarColor) tg.setBottomBarColor('#FFFFFF');
  tg.enableClosingConfirmation();
  function setVH() {
    document.documentElement.style.setProperty('--vh', (tg.viewportStableHeight || window.innerHeight) + 'px');
  }
  setVH();
  tg.onEvent('viewportChanged', setVH);
}

function haptic(type, strength) {
  if (!tg || !tg.HapticFeedback) return;
  if (type === 'impact') tg.HapticFeedback.impactOccurred(strength || 'light');
  if (type === 'notify') tg.HapticFeedback.notificationOccurred(strength || 'success');
}

/* ── Data ── */
var STYLES = [
  { id:'japandi',        name:'Japandi',           desc:'Тёплое дерево, лён, низкие силуэты',             pc:'prev-japandi' },
  { id:'modern_classic', name:'Modern Classic',    desc:'Мрамор, бархат, симметрия и латунь',             pc:'prev-modern_classic' },
  { id:'scandi',         name:'Scandi-минимализм', desc:'Светлое дерево, мягкий текстиль, тихая палитра', pc:'prev-scandi' },
];
var ROOMS = [
  { id:'living',   name:'Гостиная', em:'🛋',  pc:'prev-living' },
  { id:'bedroom',  name:'Спальня',  em:'🛏',  pc:'prev-bedroom' },
  { id:'bathroom', name:'Ванная',   em:'🛁', pc:'prev-bathroom' },
];
var CATS = [
  { id:'furniture', px:'f', ic:'ic-f' },
  { id:'lighting',  px:'l', ic:'ic-l' },
  { id:'materials', px:'m', ic:'ic-m' },
];
var LABELS = {
  furniture: ['Диван','Кофейный стол','Кресло','Стеллаж','Обеденный стол','Стул','Комод','Тумба','Пуф'],
  lighting:  ['Торшер','Подвесной','Настольная лампа','Бра','Споты','Потолочный','Лента','Декор','Ночник'],
  materials: ['Пол','Стены','Потолок','Текстиль','Шторы','Ковёр','Подушки','Камень','Стекло'],
};
var OPTS = {
  furniture: [['Классический','Бионический'],['Круглый','Прямоугольный'],['С подлокотниками','Безрамный'],['Открытый','Закрытый'],['Деревянный','Мраморный'],['Мягкий','Металлический'],['Высокий','Низкий'],['Угловой','Островной'],['Круглый','Квадратный']],
  lighting:  [['Напольный','Дуговой'],['Одиночный','Гроздь'],['Классическая','Арт'],['Одинарное','Двойное'],['Врезные','Накладные'],['Плафон','Хрусталь'],['Тёплая','Холодная'],['Лаконичный','Декоративный'],['Хрустальный','Минималистичный']],
  materials: [['Светлый дуб','Тёмный дуб'],['Штукатурка','Обои'],['Белый','Бетон'],['Лён','Бархат'],['Льняные','Бархатные'],['Натуральный','Геом.'],['Однотонные','Орнамент'],['Сланец','Мрамор'],['Прозрачное','Матовое']],
};

/* ── State ── */
var S = { style:null, room:null, setup:{furniture:{},lighting:{},materials:{}} };
CATS.forEach(function(c) { for (var i=1;i<=9;i++) S.setup[c.id][c.px+'_'+i]='main'; });

(function() {
  try {
    var saved = JSON.parse(sessionStorage.getItem('int_state') || 'null');
    if (saved && saved.style) S.style = saved.style;
    if (saved && saved.room)  S.room  = saved.room;
    if (saved && saved.setup) S.setup = saved.setup;
  } catch(e) {}
})();

function save() {
  try { sessionStorage.setItem('int_state', JSON.stringify({style:S.style,room:S.room,setup:S.setup})); } catch(e) {}
}

/* ── Helpers ── */
var CHK = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function iconUrl(style, room, cat, slotId, variant) {
  // return '/assets/icons/'+style+'__'+room+'__'+cat+'__'+slotId+'__'+variant+'.webp';
  return null;
}

function scrollTo(id) { document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'}); }

/* ── Render styles ── */
function renderStyles() {
  var wrap = document.getElementById('style-cards');
  wrap.innerHTML = '';
  STYLES.forEach(function(s) {
    var d = document.createElement('div');
    d.className = 'style-card' + (S.style === s.id ? ' sel' : '');
    d.innerHTML =
      '<div class="style-card__img ' + s.pc + '"></div>' +
      '<div class="style-card__row">' +
        '<div><div class="style-card__name">' + s.name + '</div>' +
        '<div class="style-card__desc">' + s.desc + '</div></div>' +
        '<div class="chk">' + CHK + '</div>' +
      '</div>';
    d.addEventListener('click', function() {
      haptic('impact','medium');
      S.style = s.id; save();
      renderStyles(); renderRooms();
      setTimeout(function() { scrollTo('sec-room'); }, 250);
    });
    wrap.appendChild(d);
  });
}

/* ── Render rooms ── */
function renderRooms() {
  var wrap = document.getElementById('room-cards');
  wrap.innerHTML = '';
  ROOMS.forEach(function(r) {
    var d = document.createElement('div');
    d.className = 'room-card' + (S.room === r.id ? ' sel' : '');
    d.innerHTML =
      '<div class="room-card__img ' + r.pc + '">' + r.em + '</div>' +
      '<div class="room-card__name">' + r.name + '</div>' +
      '<div class="chk" style="margin-right:14px">' + CHK + '</div>';
    d.addEventListener('click', function() {
      haptic('impact','medium');
      S.room = r.id; save();
      renderRooms(); renderSetup();
      setTimeout(function() { scrollTo('sec-setup'); }, 250);
    });
    wrap.appendChild(d);
  });
}

/* ── Render setup ── */
function renderSetup() {
  CATS.forEach(function(cat) {
    var pane = document.getElementById('pane-' + cat.id);
    pane.innerHTML = '';
    LABELS[cat.id].forEach(function(lbl, idx) {
      var slotId = cat.px + '_' + (idx + 1);
      var chosen = S.setup[cat.id][slotId] || 'main';
      var slotEl = document.createElement('div');
      slotEl.innerHTML = '<div class="slot-lbl">' + lbl + '</div>';
      var optsEl = document.createElement('div');
      optsEl.className = 'slot-opts';
      ['main','alt'].forEach(function(v, vi) {
        var card = document.createElement('div');
        card.className = 'opt' + (chosen === v ? ' on' : '');
        var url = iconUrl(S.style, S.room, cat.id, slotId, v);
        var iconHtml = url
          ? '<div class="opt__icon"><img src="' + url + '" loading="lazy" decoding="async" alt=""></div>'
          : '<div class="opt__icon ' + cat.ic + '-' + (v==='main'?'main':'alt') + '"></div>';
        var optLbl = (OPTS[cat.id][idx] || [])[vi] || (v==='main'?'A':'Б');
        card.innerHTML = iconHtml + '<div class="opt__lbl">' + optLbl + '</div>';
        card.addEventListener('click', function() {
          haptic('impact','light');
          S.setup[cat.id][slotId] = v; save();
          optsEl.querySelectorAll('.opt').forEach(function(c,ci) { c.classList.toggle('on', ci===vi); });
          updateProg(); updateSum();
        });
        optsEl.appendChild(card);
      });
      slotEl.appendChild(optsEl);
      pane.appendChild(slotEl);
    });
  });
  updateProg(); updateSum();
}

/* ── Progress ── */
function countPicked() {
  var n = 0;
  CATS.forEach(function(c) { Object.keys(S.setup[c.id]).forEach(function(k) { if (S.setup[c.id][k]) n++; }); });
  return n;
}
function updateProg() {
  var n = countPicked();
  var el = document.getElementById('prog');
  el.textContent = n + ' / 27';
  el.className = 'prog' + (n === 27 ? ' done' : '');
}
function updateSum() {
  var el = document.getElementById('cta-sum');
  var sn = STYLES.filter(function(s){return s.id===S.style;})[0];
  var rn = ROOMS.filter(function(r){return r.id===S.room;})[0];
  el.textContent = (sn && rn) ? rn.name + ' · ' + sn.name : '';
}

/* ── Category tabs ── */
document.getElementById('cat-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.cat-tab');
  if (!btn) return;
  haptic('impact','light');
  var cat = btn.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.toggle('on', t.dataset.cat===cat); });
  document.querySelectorAll('.cat-pane').forEach(function(p) { p.classList.toggle('on', p.dataset.cat===cat); });
});

/* ── Progress chip click ── */
document.getElementById('prog').addEventListener('click', function() {
  for (var ci=0;ci<CATS.length;ci++) {
    var cat = CATS[ci];
    for (var i=1;i<=9;i++) {
      if (!S.setup[cat.id][cat.px+'_'+i]) {
        document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.toggle('on',t.dataset.cat===cat.id);});
        document.querySelectorAll('.cat-pane').forEach(function(p){p.classList.toggle('on',p.dataset.cat===cat.id);});
        return;
      }
    }
  }
});

/* ── CTA ── */
document.getElementById('btn-back').addEventListener('click', function() {
  haptic('impact','light'); scrollTo('sec-style');
});

var locked = false;
document.getElementById('btn-gen').addEventListener('click', function() {
  if (locked) return;
  locked = true;
  haptic('notify','success');
  var btn = this; btn.disabled = true; btn.textContent = '...';
  var payload = { v:1, style:S.style, room:S.room, setup:S.setup, ts:Math.floor(Date.now()/1000) };
  setTimeout(function() {
    if (tg) {
      try {
        if (tg.disableClosingConfirmation) tg.disableClosingConfirmation();
        tg.sendData(JSON.stringify(payload));
      } catch(e) {
        btn.disabled = false; btn.textContent = 'Сгенерировать ▶'; locked = false;
        if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();
      }
    } else {
      console.log('payload:', JSON.stringify(payload, null, 2));
      alert('Демо-режим.\nСтиль: ' + payload.style + '\nКомната: ' + payload.room + '\n\nПолный payload в консоли.');
      btn.disabled = false; btn.textContent = 'Сгенерировать ▶'; locked = false;
    }
  }, 300);
});

/* ── Telegram BackButton ── */
if (tg && tg.BackButton) {
  document.body.addEventListener('scroll', function() {
    if (document.body.scrollTop > 80) tg.BackButton.show(); else tg.BackButton.hide();
  });
  tg.BackButton.onClick(function() {
    if (document.body.scrollTop < 100) {
      if (tg.disableClosingConfirmation) tg.disableClosingConfirmation();
      tg.close();
    } else {
      scrollTo('sec-style');
    }
  });
}

/* ── Telegram MainButton ── */
if (tg && tg.MainButton) {
  tg.MainButton.setParams({text:'Сгенерировать', color:'#1A1A1A', text_color:'#FFFFFF'});
}

/* ── Init ── */
renderStyles();
renderRooms();
renderSetup();
</script>
</body>
</html>
